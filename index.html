<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zen Mood Gift - Personalized Interactive Experience</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }
        body, html { width: 100%; height: 100%; overflow: hidden; background-color: #e0e0e0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        #webgl-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        #silver-mirror-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 2; background: transparent; transition: opacity 2.5s cubic-bezier(0.4, 0, 0.2, 1); pointer-events: none; }
        #theater-mask { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 3; background-color: rgba(0, 0, 0, 0.65); opacity: 0; transition: opacity 1.5s ease; pointer-events: none; }
        #ui-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 4; display: flex; justify-content: center; align-items: center; pointer-events: none; }
        
        .cloud-box { position: absolute; background: rgba(255, 255, 255, 0.12); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.2); padding: 2.5rem 3.5rem; border-radius: 24px; color: #333; text-align: center; box-shadow: 0 20px 40px rgba(0,0,0,0.1); pointer-events: auto; opacity: 0; transform: translateY(20px) scale(0.95); transition: opacity 1.5s ease, transform 1.5s ease, color 1.5s ease; animation: floatingBump 6s ease-in-out infinite alternate; }
        .cloud-box.dark-mode { color: #fff; background: rgba(0, 0, 0, 0.2); border-color: rgba(255, 255, 255, 0.15); box-shadow: 0 20px 40px rgba(0,0,0,0.4); }
        @keyframes floatingBump { 0% { transform: translateY(0px) rotate(0deg); } 50% { transform: translateY(-10px) rotate(0.5deg) scale(1.01); } 100% { transform: translateY(5px) rotate(-0.5deg); } }
        .cloud-box.show { opacity: 1; transform: translateY(0) scale(1); }
        .cloud-box.fade-fast { transition: opacity 0.3s ease, transform 0.3s ease !important; opacity: 0 !important; transform: scale(0.9) !important; }
        h2 { font-size: 1.8rem; margin-bottom: 1.5rem; letter-spacing: 1px; font-weight: 400; }
        .options-list { display: flex; flex-direction: column; gap: 12px; min-width: 280px; }
        
        .btn-option { background: rgba(0, 0, 0, 0.05); border: 1px solid rgba(0, 0, 0, 0.15); color: #333; padding: 14px 20px; border-radius: 14px; font-size: 1rem; cursor: pointer; transition: all 0.25s ease; text-align: center; }
        .cloud-box.dark-mode .btn-option { background: rgba(255, 255, 255, 0.15); border-color: rgba(255, 255, 255, 0.25); color: #fff; }
        .btn-option:hover { background: rgba(0, 0, 0, 0.1); border-color: #333; transform: translateY(-2px); }
        .cloud-box.dark-mode .btn-option:hover { background: rgba(255, 255, 255, 0.3); border-color: #fff; }

        #recording-ui {
            position: absolute;
            bottom: 24px;
            right: 24px;
            z-index: 5;
            background: rgba(0, 0, 0, 0.6);
            color: #fff;
            padding: 10px 18px;
            border-radius: 30px;
            font-size: 0.9rem;
            letter-spacing: 0.5px;
            display: none;
            align-items: center;
            gap: 8px;
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255,255,255,0.1);
        }
        #recording-dot {
            width: 8px;
            height: 8px;
            background-color: #ff4d4d;
            border-radius: 50%;
            animation: pulse 1s infinite alternate;
        }
        @keyframes pulse { from { opacity: 0.3; } to { opacity: 1; } }

        .btn-download {
            background: #27ae60 !important;
            color: white !important;
            border-color: #219653 !important;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(39, 174, 96, 0.4);
        }
        .btn-download:hover {
            background: #219653 !important;
            transform: translateY(-2px);
        }

        .btn-next-time {
            background: rgba(255, 255, 255, 0.1) !important;
            color: rgba(255, 255, 255, 0.7) !important;
            border: 1px solid rgba(255, 255, 255, 0.2) !important;
            font-size: 0.9rem !important;
            padding: 10px 20px !important;
        }
        .btn-next-time:hover {
            background: rgba(255, 255, 255, 0.2) !important;
            color: #fff !important;
            border-color: rgba(255, 255, 255, 0.5) !important;
        }
    </style>
</head>
<body>

    <canvas id="webgl-canvas"></canvas>
    <div id="silver-mirror-overlay"></div>
    <div id="theater-mask"></div>

    <div id="recording-ui">
        <div id="recording-dot"></div>
        <span id="recording-text">Recording for 30 sec</span>
    </div>

    <div id="ui-container">
        <div id="dialog-box" class="cloud-box">
            <h2 id="dialog-text">Hello there ...</h2>
            <div id="options-container" class="options-list" style="display: none;"></div>
        </div>
    </div>

    <script>
        // ==========================================
        // SHADER CODES SECTION (共用安全底層)
        // ==========================================
        const vertexShaderCode = `
            varying vec2 vUv;
            void main() { vUv = uv; gl_Position = vec4(position, 1.0); }
        `;

        const paletteSharedGLSL = `
            uniform vec2 iResolution;
            uniform float iTime;
            uniform float u_wave_a;
            uniform float u_wave_b;
            uniform vec3 u_palette_bias;
            uniform float u_silver_mode; 
            varying vec2 vUv;

            // 🎨 【純淨薰衣草紫色系】不爆螢光，高質感漸層
            vec3 palette( float t, vec3 bias ){ 
                vec3 a = vec3(0.45, 0.42, 0.50);   
                vec3 b = vec3(0.40, 0.38, 0.45);   
                vec3 c = vec3(1.00, 1.00, 1.00);   
                vec3 d = vec3(0.60, 0.45, 0.75) + bias; 
                return a + b * cos( 6.283185 * (c * t + d) );
            }

            float lakeSparkle(vec2 uv, float time) {
                vec2 p = (uv * 2.0 - 1.0);
                p.x *= iResolution.x / (iResolution.y + 0.0001);
                float sparkleA = sin(p.x * 2.2 + time * 0.8) * cos(p.y * 1.8 + time * 0.6);
                float sparkleB = sin(p.x * 1.9 - time * 0.7 + 2.5) * sin(p.y * 2.4 + time * 0.9 + 4.0);
                float sparkleC = cos(p.x * 3.5 + time * 1.2) * cos(p.y * 3.2 - time * 1.1);
                float combined = sparkleA * 0.5 + sparkleB * 0.4 + sparkleC * 0.1;
                float finalSparkle = smoothstep(0.4, 0.95, combined);
                return finalSparkle * 0.035;
            }
        `;

        // 1. 🌸 花朵著色器
        const flowerFragmentCode = paletteSharedGLSL + `
            void main() {
                vec2 uv_center = (vUv * 2.0 - 1.0);
                uv_center.x *= iResolution.x / (iResolution.y + 0.0001);
                vec2 uv_bg = vUv;
                float sparkle = lakeSparkle(uv_bg, iTime);
                vec3 baseSilverBg = mix(vec3(0.86, 0.88, 0.90), vec3(1.0), sparkle);
                float bg_t = uv_bg.x * 0.1 + uv_bg.y * 0.1 + iTime * 0.2;
                vec3 backgroundColor = palette(bg_t, vec3(0.0));
                vec3 rippleLayerColorSum = vec3(0.0);
                float total_mix_weight = 0.0;
                float totalLoop = 30.0; 

                float globalTime = mod(iTime, totalLoop);
                bool isFirstHalf = (globalTime < 15.0);

                for(int i = 0; i < 7; i++) {
                    float timeInterval = 1.2;
                    float timeOffset = float(i) * timeInterval;
                    float rippleTime = mod(iTime - timeOffset, totalLoop);
                    if (rippleTime < 0.0) rippleTime += totalLoop;
                    
                    vec2 startCorner; 
                    if (isFirstHalf) { startCorner = vec2(1.5, 0.7); } 
                    else { startCorner = vec2(-1.5, 0.7); }
                    
                    float stageTime = (rippleTime < 15.0) ? rippleTime : rippleTime - 15.0;
                    
                    float speedMultiplier = (0.8 + float(i) * 0.01) * 2.2; 
                    float progress = stageTime * speedMultiplier; 
                    vec2 posOffset = vec2(float(i) * 0.03 * sign(startCorner.x), float(i) * 0.015); 
                    vec2 shiftedStart = startCorner + posOffset;
                    vec3 colorBias = vec3(float(i) * 0.15, float(i) * 0.08, float(i) * 0.05);
                    vec2 targetCorner = -shiftedStart;
                    
                    float moveProgress = smoothstep(0.0, 5.0, stageTime);
                    vec2 currentCenter = mix(shiftedStart, targetCorner, moveProgress);
                    float centerDist = length(currentCenter);
                    float instanceSize = 1.0 - float(i) * 0.1; 
                    float flowerScale = instanceSize * mix(1.0, 0.03, smoothstep(0.0, 1.5, centerDist));
                    vec2 toCorner = uv_center - currentCenter;
                    float r = length(toCorner); 
                    float angle = atan(toCorner.y, toCorner.x + 0.0001); 
                    float theta5 = angle * 2.5; float flower_base = abs(sin(theta5)); float notch = 1.0 - abs(cos(theta5));
                    float sakuraShape = flower_base * 0.7 + notch * 0.25;
                    float base_d = (r / max(flowerScale, 0.01)) / (0.3 + 0.5 * sakuraShape);
                    float theta = sin(base_d * 0.5 - progress * 1.5); float alpha = sin(base_d * 1.5 - progress * 3.5);
                    float theta_glow = 0.2 / (abs(theta) + 0.2); float alpha_glow = 0.06 / (abs(alpha) + 0.06); 
                    float layer_glow = theta_glow + alpha_glow;
                    
                    float fadeIn = smoothstep(0.0, 0.6, stageTime);
                    float fadeOut = 1.0 - smoothstep(6.0, 8.0, stageTime);
                    float spaceFade = exp(-base_d * 0.2); 
                    
                    layer_glow *= fadeIn * fadeOut * spaceFade;
                    vec3 thisCornerColor = palette(iTime * 0.08 + float(i) * 0.25, colorBias);
                    rippleLayerColorSum += thisCornerColor * layer_glow;
                    total_mix_weight += layer_glow;
                }
                float rippleMixControl = 1.0 - exp(-total_mix_weight * 1.3);
                vec3 finalRippleColor = rippleLayerColorSum / (total_mix_weight + 0.001);
                vec3 finalColor = mix(backgroundColor, finalRippleColor, rippleMixControl);
                
                finalColor = mix(vec3(0.5), finalColor, 1.2); 
                finalColor = pow(max(finalColor, vec3(0.0)), vec3(1.0 / 2.2));
                
                gl_FragColor = vec4(mix(baseSilverBg, finalColor, u_silver_mode), 1.0);
            }
        `;

        // 2. 🌿 樹葉著色器（🛠️ 邏輯校正：已將切換點完美修正為 15.0 秒）
        const leafFragmentCode = paletteSharedGLSL + `
            const float BASE_MOVE_DURATION  = 12.0;  
            const float BASE_VEIN_SPEED_A   = 0.3;   
            const float BASE_VEIN_SPEED_B   = 0.5;   
            const float BASE_ELLIP_SPEED_A  = 0.8;   
            const float BASE_ELLIP_SPEED_B  = 2.0;   

            void main() {
                // 保持您最滿意的原始幾何密度與波紋參數
                float waveFreq    = 1.2;    float waveAmp    = 0.12;
                float arcCurv     = 0.8;    float veinThick  = 0.012;
                float ellipScale  = 0.08;   float ellipRatioX = 30.0; float ellipRatioY = 40.0; 
                float ellipThick1 = 0.03;   float ellipThick2 = 0.015; 
                float sharpen     = 3.5;    float colorDelay  = 0.5; 

                vec2 uv_center = (vUv * 2.0 - 1.0); 
                uv_center.x *= iResolution.x / (iResolution.y + 0.0001);
                float sparkle = lakeSparkle(vUv, iTime); vec3 baseSilverBg = mix(vec3(0.85, 0.88, 0.91), vec3(1.0), sparkle);
                vec3 backgroundColor = palette(vUv.x * 0.1 + vUv.y * 0.1 + iTime * 0.2, vec3(0.0));
                
                vec3 rippleLayerColorSum = vec3(0.0); float total_mix_weight = 0.0; 
                float totalLoop = 30.0; // 總循環週期 30 秒
                
                float globalTime = mod(iTime, totalLoop);
                
                float angle_radians = atan(5.0 / 9.0); float ext_cos = cos(angle_radians); float ext_sin = sin(angle_radians);
                
                float mod_vein_speed_a  = BASE_VEIN_SPEED_A  * (u_wave_a / 6.0);
                float mod_vein_speed_b  = BASE_VEIN_SPEED_B  * (u_wave_b / 10.0);
                float mod_ellip_speed_a = BASE_ELLIP_SPEED_A * (u_wave_a / 6.0);
                float mod_ellip_speed_b = BASE_ELLIP_SPEED_B * (u_wave_b / 10.0);

                for(int i = 0; i < 4; i++) {
                    float timeOffset = float(i) * 4.2; 
                    float rippleTime = mod(iTime - timeOffset, totalLoop);
                    if (rippleTime < 0.0) rippleTime += totalLoop;
                    
                    vec2 startCorner, center1, center2; 
                    float stageTime; 
                    
                    // ✨【致命錯誤修正】：精確對齊 15.0 秒邊界，配合 30 秒總循環
                    if (rippleTime < 15.0) { 
                        startCorner = vec2(1.5, 0.7); center1 = vec2(1.5, -1.3); center2 = vec2(-1.5, 1.3); 
                        stageTime = rippleTime;
                    } else { 
                        startCorner = vec2(-1.5, 0.7); center1 = vec2(-1.5, -1.3); center2 = vec2(1.5, 1.3); 
                        stageTime = rippleTime - 15.0;
                    }
                    
                    float activeMoveDuration = BASE_MOVE_DURATION * (6.0 / max(u_wave_a, 0.1));
                    vec2 targetCorner = -startCorner;
                    vec2 currentCenter = mix(startCorner, targetCorner, smoothstep(0.0, activeMoveDuration, stageTime));
                    
                    float leafScale = (1.0 - float(i) * 0.2) * sin(clamp(stageTime / 14.0, 0.0, 1.0) * 3.14159);
                    leafScale = max(abs(leafScale), 0.001) * sign(leafScale); 

                    vec2 toCorner = uv_center - currentCenter;
                    float moveAngle = atan(targetCorner.y - startCorner.y, targetCorner.x - startCorner.x + 0.0001);
                    vec2 leaf_uv = vec2(toCorner.x * cos(moveAngle) + toCorner.y * sin(moveAngle), -toCorner.x * sin(moveAngle) + toCorner.y * cos(moveAngle));
                    
                    leaf_uv.y += sin(leaf_uv.x * waveFreq) * waveAmp * leafScale;
                    float v_arc = (leaf_uv.x - sqrt(max(abs(leaf_uv.y), 0.0001)) * arcCurv) / leafScale;
                    
                    float hz_a_time = stageTime * mod_vein_speed_a;
                    float hz_b_time = stageTime * mod_vein_speed_b;
                    
                    float leaf_glow = (0.6 / (abs(sin(v_arc * 1.0 - hz_a_time)) + 0.4) * 0.3 + 
                                       0.25 / (abs(sin(v_arc * 2.5 - hz_b_time)) + 0.15) * 0.4);
                    leaf_glow += (veinThick / (abs(leaf_uv.y / leafScale) + veinThick)) * smoothstep(1.0, 0.0, leaf_uv.x / leafScale);
                    
                    float current_sin = (rippleTime < 15.0) ? ext_sin : -ext_sin;
                    float ellipse_glow = 0.0; vec2 centers[2]; centers[0] = center1; centers[1] = center2;
                    
                    for(int j = 0; j < 2; j++) {
                        vec2 toC = uv_center - centers[j]; vec2 rot = vec2(toC.x * ext_cos + toC.y * current_sin, -toC.x * current_sin + toC.y * ext_cos);
                        float d = sqrt(rot.x * rot.x * ellipRatioX + rot.y * rot.y * ellipRatioY) * ellipScale;
                        
                        float g1 = pow(ellipThick1 / (abs(sin(d * 0.8 - stageTime * mod_ellip_speed_a)) + ellipThick1), 1.8);
                        float g2 = pow(ellipThick2 / (abs(sin(d * 2.5 - stageTime * mod_ellip_speed_b)) + ellipThick2), 1.8);
                        ellipse_glow += (g1 + g2) * exp(-d * 0.5) * 0.35 * sharpen;
                    }
                    
                    float global_env = smoothstep(1.8, 0.0, abs(uv_center.x * ext_sin - uv_center.y * ext_cos) * 0.4);
                    float time_env = smoothstep(0.0, 1.0, stageTime) * (1.0 - smoothstep(10.0, 14.0, stageTime));
                    
                    vec3 bias = vec3(float(i) * 0.05);
                    vec3 leafColor = palette(iTime * 0.08 + float(i) * 0.25, bias);
                    vec3 ellipColor = palette(iTime * 0.08 + float(i) * 0.25 + colorDelay, bias);
                    
                    rippleLayerColorSum += (leafColor * leaf_glow + ellipColor * ellipse_glow) * time_env * global_env;
                    total_mix_weight += (leaf_glow + ellipse_glow) * time_env * global_env;
                }
                vec3 finalColor = mix(backgroundColor, rippleLayerColorSum / (total_mix_weight + 0.001), 1.0 - exp(-total_mix_weight * 1.2));
                
                finalColor = mix(vec3(0.5), finalColor, 1.2); 
                finalColor = pow(max(finalColor, vec3(0.0)), vec3(1.0 / 2.2));
                
                gl_FragColor = vec4(mix(baseSilverBg, finalColor, u_silver_mode), 1.0);
            }
        `;

        // 3. 🌊 海浪著色器
        const waveFragmentCode = paletteSharedGLSL + `
            const float BASE_MOVE_DURATION = 12.0; 
            const float BASE_SPEED_TWIST = 0.5; 
            const float BASE_SPEED_WAVE1 = 2.0; 
            const float BASE_SPEED_WAVE2 = 3.0; 
            
            void main() {
                vec2 uv_center = (vUv * 2.0 - 1.0); 
                uv_center.x *= iResolution.x / (iResolution.y + 0.0001);
                float sparkle = lakeSparkle(vUv, iTime); vec3 baseSilverBg = mix(vec3(0.85, 0.88, 0.91), vec3(1.0), sparkle);
                float bg_t = vUv.x * 0.1 + vUv.y * 0.1 + iTime * 0.2; vec3 finalGraphicBg = palette(bg_t, vec3(0.0));
                vec3 rippleLayerColorSum = vec3(0.0); float total_mix_weight = 0.0; float totalLoop = 30.0; 
                
                float globalTime = mod(iTime, totalLoop);
                bool isFirstHalf = (globalTime < 15.0);

                float mod_speed_twist = BASE_SPEED_TWIST * (u_wave_a / 20.0); 
                float mod_speed_wave1 = BASE_SPEED_WAVE1 * (u_wave_a / 20.0); 
                float mod_speed_wave2 = BASE_SPEED_WAVE2 * (u_wave_b / 40.0);

                for(int i = 0; i < 2; i++) {
                    float timeInterval = 7.5; float timeOffset = float(i) * timeInterval; float rippleTime = mod(iTime - timeOffset, totalLoop);
                    if (rippleTime < 0.0) rippleTime += totalLoop;
                    
                    vec2 startCorner; 
                    if (isFirstHalf) { startCorner = vec2(-1.5, -0.7); } else { startCorner = vec2(1.5, -0.7); }
                    
                    float stageTime = (rippleTime < 15.0) ? rippleTime : rippleTime - 15.0;
                    vec2 startPos = startCorner + vec2(float(i) * 0.05 * sign(startCorner.x), -float(i) * 0.03);
                    vec2 targetPos = -startPos;
                    vec2 currentCenter = mix(startPos, targetPos, smoothstep(0.0, BASE_MOVE_DURATION * (20.0 / max(u_wave_a, 0.1)), stageTime));
                    
                    vec2 toCenter = uv_center - currentCenter; float r = length(toCenter); 
                    float angle = atan(toCenter.y, toCenter.x + 0.0001); 
                    float twistedAngle = angle + (1.5 / (r + 0.1)) * (-sign(startCorner.x)) - stageTime * mod_speed_twist;
                    
                    float sin_val = sin(twistedAngle * 3.0);
                    float waveShape = sqrt(max(abs(sin_val), 0.001)) * (sin_val >= 0.0 ? 1.0 : -
