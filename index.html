<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zen Mood Gift - Interactive System</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
        }
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #e0e0e0; /* 基礎銀灰色底 */
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        /* 🖥️ Three.js Canvas 背景 */
        #webgl-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* 🥈 【新功能】鏡面銀色+白光掃過的環境遮罩層 */
        #silver-mirror-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            background: linear-gradient(135deg, #cfd9df 0%, #e2ebf0 100%);
            box-shadow: inset 0 0 100px rgba(255,255,255,0.6);
            transition: opacity 2.5s cubic-bezier(0.4, 0, 0.2, 1); /* 絲滑淡出 */
            pointer-events: none;
            overflow: hidden;
        }
        /* 💡 流動的白光環境特效 */
        #silver-mirror-overlay::after {
            content: '';
            position: absolute;
            top: -50%; left: -60%;
            width: 30%; height: 200%;
            background: linear-gradient(to right, rgba(255,255,255,0) 0%, rgba(255,255,255,0.9) 50%, rgba(255,255,255,0) 100%);
            transform: rotate(30deg);
            animation: silverShine 4s cubic-bezier(0.3, 0.1, 0.3, 1) infinite;
        }
        @keyframes silverShine {
            0% { left: -60%; opacity: 0; }
            10% { opacity: 1; }
            40% { left: 140%; opacity: 1; }
            50%, 100% { left: 140%; opacity: 0; }
        }

        /* 🕶️ 【新功能】半透明黑色劇場遮罩 (用於中後期揭幕) */
        #theater-mask {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 3;
            background-color: rgba(0, 0, 0, 0.65); /* 65% 半透明黑 */
            opacity: 0; /* 預設不顯示，等 a moment before the gift 才現身 */
            transition: opacity 1.5s ease;
            pointer-events: none;
        }

        /* ☁️ UI 互動與漂浮對話框 */
        #ui-container {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 4; /* 確保在所有遮罩最上方 */
            display: flex;
            justify-content: center;
            align-items: center;
            pointer-events: none;
        }
        .cloud-box {
            position: absolute;
            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 2.5rem 3.5rem;
            border-radius: 24px;
            color: #333; /* 起始在銀色背景，使用深色字 */
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            pointer-events: auto;
            opacity: 0;
            transform: translateY(20px) scale(0.95);
            transition: opacity 1.5s ease, transform 1.5s ease, color 1.5s ease;
            animation: floatingBump 6s ease-in-out infinite alternate;
        }
        /* 當進入黑夜/Shader 模式時，對話框自動轉換成極光白字 */
        .cloud-box.dark-mode {
            color: #fff;
            background: rgba(0, 0, 0, 0.2);
            border-color: rgba(255, 255, 255, 0.15);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        @keyframes floatingBump {
            0% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-10px) rotate(0.5deg) scale(1.01); }
            100% { transform: translateY(5px) rotate(-0.5deg); }
        }
        .cloud-box.show { opacity: 1; transform: translateY(0) scale(1); }
        .cloud-box.fade-fast {
            transition: opacity 0.3s ease, transform 0.3s ease !important;
            opacity: 0 !important;
            transform: scale(0.9) !important;
        }
        h2 { font-size: 1.8rem; margin-bottom: 1.5rem; letter-spacing: 1px; font-weight: 400; }
        .options-list { display: flex; flex-direction: column; gap: 12px; min-width: 280px; }
        .btn-option {
            background: rgba(0, 0, 0, 0.05);
            border: 1px solid rgba(0, 0, 0, 0.15);
            color: #333;
            padding: 14px 20px; border-radius: 14px; font-size: 1rem; cursor: pointer; transition: all 0.25s ease; text-align: center;
        }
        .cloud-box.dark-mode .btn-option {
            background: rgba(255, 255, 255, 0.15);
            border-color: rgba(255, 255, 255, 0.25);
            color: #fff;
        }
        .btn-option:hover {
            background: rgba(0, 0, 0, 0.1);
            border-color: #333;
            transform: translateY(-2px);
        }
        .cloud-box.dark-mode .btn-option:hover {
            background: rgba(255, 255, 255, 0.3);
            border-color: #fff;
        }
    </style>
</head>
<body>

    <canvas id="webgl-canvas"></canvas>
    
    <div id="silver-mirror-overlay"></div>
    
    <div id="theater-mask"></div>

    <div id="ui-container">
        <div id="dialog-box" class="cloud-box">
            <h2 id="dialog-text">Hello there ...</h2>
            <div id="options-container" class="options-list" style="display: none;"></div>
        </div>
    </div>

    <script>
        const shaderUniformsHeader = `
            uniform vec2 iResolution; uniform float iTime;
            uniform float u_freq_multiplier; uniform float u_hz6_speed; uniform float u_hz10_speed; uniform vec3 u_palette_bias;
            vec3 palette( float t, vec3 bias ){ 
                vec3 a = vec3(0.5, 0.5, 0.5); vec3 b = vec3(0.5, 0.5, 0.5); vec3 c = vec3(1.0, 1.0, 1.0); vec3 d = u_palette_bias + bias; 
                return a + b * cos( 6.283185 * (c * t + d) );
            }
        `;

        const flowerShader = shaderUniformsHeader + `
            void main() {
                vec2 uv_center = (gl_FragCoord.xy * 2.0 - iResolution.xy) / iResolution.y;
                vec2 uv_bg = gl_FragCoord.xy / iResolution.xy;
                float bg_t = uv_bg.x * 0.1 + uv_bg.y * 0.1 + iTime * (0.2 * u_freq_multiplier);
                vec3 backgroundColor = palette(bg_t, vec3(0.0));
                vec3 rippleLayerColorSum = vec3(0.0); float total_mix_weight = 0.0; float totalLoop = 50.0; 
                for(int i = 0; i < 4; i++) {
                    float timeInterval = 3.0; float timeOffset = float(i) * timeInterval + (float(i) * (float(i) - 1.0)) * 0.5;
                    float rippleTime = mod(iTime - timeOffset, totalLoop); if (rippleTime < 0.0) rippleTime += totalLoop;
                    vec2 startCorner; float stageTime; 
                    if (rippleTime < 25.0) { startCorner = vec2(1.5, 0.7); stageTime = rippleTime; } else { startCorner = vec2(-1.5, 0.7); stageTime = rippleTime - 25.0; }
                    float speedMultiplier = (0.8 + float(i) * 0.01) * u_freq_multiplier; float progress = stageTime * speedMultiplier; 
                    vec2 posOffset = vec2(float(i) * 0.03 * sign(startCorner.x), float(i) * 0.015); vec2 shiftedStart = startCorner + posOffset;
                    vec3 colorBias = vec3(float(i) * 0.15, float(i) * 0.08, float(i) * 0.05); vec2 targetCorner = -shiftedStart;
                    vec2 currentCenter = mix(shiftedStart, targetCorner, smoothstep(0.0, 12.0, stageTime * u_freq_multiplier));
                    float centerDist = length(currentCenter); float instanceSize = 1.0 - float(i) * 0.2; 
                    float flowerScale = instanceSize * mix(1.0, 0.03, smoothstep(0.0, 1.5, centerDist));
                    vec2 toCorner = uv_center - currentCenter; float r = length(toCorner); float angle = atan(toCorner.y, toCorner.x); 
                    float theta5 = angle * 2.5; float flower_base = abs(sin(theta5)); float notch = 1.0 - abs(cos(theta5));
                    float sakuraShape = flower_base * 0.7 + notch * 0.25; float base_d = (r / flowerScale) / (0.3 + 0.5 * sakuraShape);
                    float theta = sin(base_d * 0.5 - progress * 1.5); float alpha = sin(base_d * 1.5 - progress * 3.5);
                    float theta_glow = 0.2 / (abs(theta) + 0.2); float alpha_glow = 0.06 / (abs(alpha) + 0.06); float layer_glow = theta_glow + alpha_glow;
                    float fadeIn = smoothstep(0.0, 1.5, stageTime * u_freq_multiplier); float fadeOut = 1.0 - smoothstep(12.0, 17.0, stageTime * u_freq_multiplier);
                    layer_glow *= fadeIn * fadeOut * exp(-base_d * 0.2);
                    vec3 thisCornerColor = palette(iTime * (0.08 * u_freq_multiplier) + float(i) * 0.25, colorBias);
                    rippleLayerColorSum += thisCornerColor * layer_glow; total_mix_weight += layer_glow;
                }
                gl_FragColor = vec4(mix(backgroundColor, rippleLayerColorSum / (total_mix_weight + 0.001), 1.0 - exp(-total_mix_weight * 1.3)), 1.0);
            }
        `;

        const leafShader = shaderUniformsHeader + `
            void main() {
                float waveFreq = 1.2; float waveAmp = 0.12; float arcCurv = 0.65; float veinThick = 0.012;
                float ellipScale = 0.08; float ellipRatioX = 30.0; float ellipRatioY = 40.0; float ellipThick1 = 0.03; float ellipThick2 = 0.015; float sharpen = 3.5; float colorDelay = 0.5;   
                vec2 uv_center = (gl_FragCoord.xy * 2.0 - iResolution.xy) / iResolution.y; vec2 uv_bg = gl_FragCoord.xy / iResolution.xy;
                vec3 backgroundColor = palette(uv_bg.x * 0.1 + uv_bg.y * 0.1 + iTime * (0.2 * u_freq_multiplier), vec3(0.0));
                vec3 rippleLayerColorSum = vec3(0.0); float total_mix_weight = 0.0; float totalLoop = 50.0; 
                float hz6 = iTime * u_hz6_speed; float hz10 = iTime * u_hz10_speed; float angle_radians = atan(5.0 / 9.0); float ext_cos = cos(angle_radians); float ext_sin = sin(angle_radians);
                for(int i = 0; i < 4; i++) {
                    float timeOffset = float(i) * 3.0 + (float(i) * (float(i) - 1.0)) * 0.5; float rippleTime = mod(iTime - timeOffset, totalLoop); if (rippleTime < 0.0) rippleTime += totalLoop;
                    vec2 startCorner, center1, center2; float stageTime; 
                    if (rippleTime < 25.0) { startCorner = vec2(1.5, 0.7); center1 = vec2(1.5, -1.3); center2 = vec2(-1.5, 1.3); stageTime = rippleTime; } 
                    else { startCorner = vec2(-1.5, 0.7); center1 = vec2(-1.5, -1.3); center2 = vec2(1.5, 1.3); stageTime = rippleTime - 25.0; }
                    vec2 targetCorner = -startCorner; vec2 currentCenter = mix(startCorner, targetCorner, smoothstep(0.0, 12.0, stageTime * u_freq_multiplier));
                    float leafScale = (1.0 - float(i) * 0.2) * sin(clamp((stageTime * u_freq_multiplier) / 14.0, 0.0, 1.0) * 3.14159);
                    vec2 toCorner = uv_center - currentCenter; float moveAngle = atan(targetCorner.y - startCorner.y, targetCorner.x - startCorner.x);
                    vec2 leaf_uv = vec2(toCorner.x * cos(moveAngle) + toCorner.y * sin(moveAngle), -toCorner.x * sin(moveAngle) + toCorner.y * cos(moveAngle));
                    leaf_uv.y += sin(leaf_uv.x * waveFreq) * waveAmp * leafScale; float v_arc = (leaf_uv.x - sqrt(abs(leaf_uv.y)) * arcCurv) / leafScale;
                    float leaf_glow = (0.6 / (abs(sin(v_arc * 1.0 - hz6)) + 0.4) * 0.3 + 0.25 / (abs(sin(v_arc * 2.5 - hz10)) + 0.15) * 0.4);
                    leaf_glow += (veinThick / (abs(leaf_uv.y / leafScale) + veinThick)) * smoothstep(1.0, 0.0, leaf_uv.x / leafScale);
                    float current_sin = (rippleTime < 25.0) ? ext_sin : -ext_sin; float ellipse_glow = 0.0; vec2 centers[2]; centers[0] = center1; centers[1] = center2;
                    for(int j = 0; j < 2; j++) {
                        vec2 toC = uv_center - centers[j]; vec2 rot = vec2(toC.x * ext_cos + toC.y * current_sin, -toC.x * current_sin + toC.y * ext_cos);
                        float d = sqrt(rot.x * rot.x * ellipRatioX + rot.y * rot.y * ellipRatioY) * ellipScale;
                        float g1 = pow(ellipThick1 / (abs(sin(d * 0.8 - stageTime * (0.8 * u_freq_multiplier))) + ellipThick1), 2.0);
                        float g2 = pow(ellipThick2 / (abs(sin(d * 2.5 - stageTime * (2.0 * u_freq_multiplier))) + ellipThick2), 2.0);
                        ellipse_glow += (g1 + g2) * exp(-d * 0.5) * 0.35 * sharpen;
                    }
                    float global_env = smoothstep(1.8, 0.0, abs(uv_center.x * ext_sin - uv_center.y * ext_cos) * 0.4);
                    float time_env = smoothstep(0.0, 1.0, stageTime * u_freq_multiplier) * (1.0 - smoothstep(10.0, 14.0, stageTime * u_freq_multiplier));
                    vec3 bias = vec3(float(i)*0.05); vec3 leafColor = palette(iTime * (0.08 * u_freq_multiplier) + float(i) * 0.25, bias); vec3 ellipColor = palette(iTime * (0.08 * u_freq_multiplier) + float(i) * 0.25 + colorDelay, bias);
                    rippleLayerColorSum += (leafColor * leaf_glow + ellipColor * ellipse_glow) * time_env * global_env; total_mix_weight += (leaf_glow + ellipse_glow) * time_env * global_env;
                }
                gl_FragColor = vec4(mix(backgroundColor, rippleLayerColorSum / (total_mix_weight + 0.001), 1.0 - exp(-total_mix_weight * 1.2)), 1.0);
            }
        `;

        const waveShader = shaderUniformsHeader + `
            void main() {
                vec2 uv_center = (gl_FragCoord.xy * 2.0 - iResolution.xy) / iResolution.y; vec2 uv_bg = gl_FragCoord.xy / iResolution.xy;
                float bg_t = uv_bg.x * 0.1 + uv_bg.y * 0.1 + iTime * (0.2 * u_freq_multiplier); vec3 backgroundColor = palette(bg_t, vec3(0.0));
                vec3 rippleLayerColorSum = vec3(0.0); float total_mix_weight = 0.0; float totalLoop = 50.0; 
                for(int i = 0; i < 2; i++) {
                    float timeInterval = 8.0; float timeOffset = float(i) * timeInterval + (float(i) * (float(i) - 1.0)) * 0.5;
                    float rippleTime = mod(iTime - timeOffset, totalLoop); if (rippleTime < 0.0) rippleTime += totalLoop;
                    vec2 startCorner; float stageTime; 
                    if (rippleTime < 25.0) { startCorner = vec2(-1.5, -0.7); stageTime = rippleTime; } else { startCorner = vec2(1.5, -0.7); stageTime = rippleTime - 25.0; }
                    float speedMultiplier = (0.8 + float(i) * 0.01) * u_freq_multiplier; float progress = stageTime * speedMultiplier; 
                    vec2 posOffset = vec2(float(i) * 0.05 * sign(startCorner.x), -float(i) * 0.03); vec2 shiftedStart = startCorner + posOffset;
                    vec3 colorBias = vec3(float(i) * 0.12, float(i) * 0.06, float(i) * 0.15); vec2 targetCorner = -shiftedStart;
                    vec2 currentCenter = mix(shiftedStart, targetCorner, smoothstep(0.0, 12.0, stageTime * u_freq_multiplier));
                    float centerDist = length(currentCenter); float instanceSize = 1.0 - float(i) * 0.15; float waveScale = instanceSize * mix(1.0, 0.1, smoothstep(0.0, 1.8, centerDist));
                    vec2 toCenter = uv_center - currentCenter; float waveDirection = -sign(startCorner.x); 
                    float r = length(toCenter); float angle = atan(toCenter.y, toCenter.x); float twist = 1.5 / (r + 0.1); float twistedAngle = angle + twist * waveDirection - progress * 0.5;
                    float waveShape = sin(twistedAngle * 3.0); waveShape = pow(abs(waveShape), 0.5) * sign(waveShape); float base_d = (r / waveScale) / (0.4 + 0.4 * waveShape);
                    float wave1 = sin(base_d * 1.0 - progress * 2.0); float wave2 = cos(base_d * 2.25 + twistedAngle * 2.0 - progress * 3.0);
                    float wave_line1 = 0.1 / (abs(wave1) + 0.1); float wave_line2 = 0.05 / (abs(wave2) + 0.05); float layer_glow = wave_line1 * 1.2 + wave_line2 * wave_line1 * 0.8;
                    float fadeIn = smoothstep(0.0, 1.5, stageTime * u_freq_multiplier); float fadeOut = 1.0 - smoothstep(12.0, 17.0, stageTime * u_freq_multiplier);
                    layer_glow *= fadeIn * fadeOut * exp(-base_d * 0.15);
                    vec3 thisCornerColor = palette(iTime * (0.05 * u_freq_multiplier) + float(i) * 0.3, colorBias); rippleLayerColorSum += thisCornerColor * layer_glow; total_mix_weight += layer_glow;
                }
                gl_FragColor = vec4(mix(backgroundColor, rippleLayerColorSum / (total_mix_weight + 0.001), 1.0 - exp(-total_mix_weight * 1.5)), 1.0);
            }
        `;
    </script>

    <script>
        // --- 1. Three.js 初始化 ---
        const canvas = document.getElementById('webgl-canvas');
        const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);

        const scene = new THREE.Scene();
        const camera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);

        const shaderUniforms = {
            iResolution: { value: new THREE.Vector2(window.innerWidth, window.innerHeight) },
            iTime: { value: 0 },
            u_freq_multiplier: { value: 1.0 },
            u_hz6_speed: { value: 0.3 },
            u_hz10_speed: { value: 0.5 },
            u_palette_bias: { value: new THREE.Vector3(0.0, 0.1, 0.2) }
        };

        const geometry = new THREE.PlaneGeometry(2, 2);
        let shaderMaterial = new THREE.ShaderMaterial({
            fragmentShader: flowerShader, // 預設櫻花，一開始被銀色遮罩擋住看不到
            uniforms: shaderUniforms,
            depthWrite: false, depthTest: false
        });
        const mesh = new THREE.Mesh(geometry, shaderMaterial);
        scene.add(mesh);

        window.addEventListener('resize', () => {
            renderer.setSize(window.innerWidth, window.innerHeight);
            shaderUniforms.iResolution.value.set(window.innerWidth, window.innerHeight);
        });

        const clock = new THREE.Clock();
        function animate() {
            requestAnimationFrame(animate);
            shaderUniforms.iTime.value = clock.getElapsedTime();
            renderer.render(scene, camera);
        }
        animate();


        // --- 2. 劇本動態與遮罩邏輯控制群 ---
        const dialogBox = document.getElementById('dialog-box');
        const dialogText = document.getElementById('dialog-text');
        const optionsContainer = document.getElementById('options-container');
        
        // 取得 DOM 遮罩元素
        const silverOverlay = document.getElementById('silver-mirror-overlay');
        const theaterMask = document.getElementById('theater-mask');

        const delay = ms => new Promise(res => setTimeout(res, ms));

        async function updateDialogText(text) {
            dialogBox.classList.remove('show');
            await delay(1500);
            dialogText.innerText = text;
            dialogBox.classList.add('show');
        }

        // 核心調度劇本系統 (完全遵循 Miro 規範)
        async function startFlow() {
            // Output 1: 銀色鏡面下，白光泛過，文字浮現
            await delay(500);
            dialogBox.classList.add('show');
            await delay(2000); // 2秒後淡出
            
            // Output 2
            await updateDialogText("How's your day?");
            await delay(2000);

            // Output 3
            await updateDialogText("Just take a breathe, and tell us ...");
            await delay(2000);

            showOption1();
        }

        // Option 1
        async function showOption1() {
            dialogBox.classList.remove('show');
            await delay(1500);
            dialogText.innerText = "How do you feel right now?";
            optionsContainer.innerHTML = `
                <div class="btn-option" onclick="selectOption1(1.0, 0.3, 0.5)">1. I'm good 😊</div>
                <div class="btn-option" onclick="selectOption1(0.5, 0.1, 0.3)">2. Just a bit tired ...</div>
                <div class="btn-option" onclick="selectOption1(1.8, 0.8, 1.5)">3. Full of energy !!</div>
            `;
            optionsContainer.style.display = "flex";
            dialogBox.classList.add('show');
        }

        function selectOption1(multiplier, hz6, hz10) {
            dialogBox.classList.add('fade-fast');
            shaderUniforms.u_freq_multiplier.value = multiplier;
            shaderUniforms.u_hz6_speed.value = hz6;
            shaderUniforms.u_hz10_speed.value = hz10;

            setTimeout(async () => {
                optionsContainer.style.display = "none";
                dialogBox.classList.remove('fade-fast');
                
                // Output 4
                dialogText.innerText = "What are you planning to do next ?";
                dialogBox.classList.add('show');
                await delay(2000);
                
                showOption2();
            }, 300);
        }

        // Option 2
        async function showOption2() {
            dialogBox.classList.remove('show');
            await delay(1500);
            dialogText.innerText = "Choose an vibe for your next step:";
            optionsContainer.innerHTML = `
                <div class="btn-option" onclick="selectOption2(0.0, 0.1, 0.2)">1. Relax on my couch</div>
                <div class="btn-option" onclick="selectOption2(0.3, 0.0, 0.4)">2. Having fun</div>
                <div class="btn-option" onclick="selectOption2(0.5, 0.5, 0.0)">3. Party !</div>
            `;
            optionsContainer.style.display = "flex";
            dialogBox.classList.add('show');
        }

        function selectOption2(r_bias, g_bias, b_bias) {
            dialogBox.classList.add('fade-fast');
            shaderUniforms.u_palette_bias.value.set(r_bias, g_bias, b_bias);

            setTimeout(() => {
                optionsContainer.style.display = "none";
                dialogBox.classList.remove('fade-fast');
                showOption3();
            }, 300);
        }

        // Option 3
        async function showOption3() {
            dialogText.innerText = "Pick a symbol that guides you:";
            optionsContainer.innerHTML = `
                <div class="btn-option" onclick="selectOption3('flower')">🌸 Sakura Flower</div>
                <div class="btn-option" onclick="selectOption3('leaf')">🌿 Radiant Leaf</div>
                <div class="btn-option" onclick="selectOption3('wave')">🌊 Great Wave</div>
            `;
            optionsContainer.style.display = "flex";
            dialogBox.classList.add('show');
        }

        function selectOption3(type) {
            dialogBox.classList.add('fade-fast');
            if (type === 'flower') mesh.material.fragmentShader = flowerShader;
            else if (type === 'leaf') mesh.material.fragmentShader = leafShader;
            else if (type === 'wave') mesh.material.fragmentShader = waveShader;
            mesh.material.needsUpdate = true;

            setTimeout(async () => {
                optionsContainer.style.display = "none";
                dialogBox.classList.remove('fade-fast');
                
                // 🎬 【關鍵翻轉點】：進入 Output 5: "A moment before the gift ..."
                dialogText.innerText = "A moment before the gift ...";
                
                // 1. 銀色鏡面在此刻優雅淡出 (Fade out)
                silverOverlay.style.opacity = '0';
                // 2. 半透明黑色遮罩同時浮現 (Fade in 掛上遮罩)
                theaterMask.style.opacity = '1';
                // 3. UI 對話框字體和按鈕切換為暗色系發光模式 (提升高對比閱讀美感)
                dialogBox.classList.add('dark-mode');
                
                dialogBox.classList.add('show');
                await delay(3000); // 遵循 Miro 規定停留 3 秒
                
                // Output 6: "And here you are !"
                await updateDialogText("And here you are !");
                await delay(2000); // 顯示 2 秒
                
                // 🔓 【終極揭幕】：字離開的同時，拿掉黑色遮罩，光芒完全釋放！
                dialogBox.classList.remove('show'); // 字離開
                theaterMask.style.opacity = '0';    // 遮罩拿掉！
            }, 300);
        }

        // 啟動引擎
        startFlow();
    </script>
</body>
</html>
