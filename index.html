<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zen Flow - Brainwave Shader Dashboard</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #0d1117;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            color: #fff;
        }

        #canvas-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 1;
        }

        /* 🎛️ 控制面板 UI 樣式 */
        #ui-panel {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            background: rgba(20, 25, 35, 0.75);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 20px 30px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            width: 90%;
            max-width: 800px;
        }

        .ui-section {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .ui-title {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: #8b949e;
            width: 100px;
            flex-shrink: 0;
        }

        .btn-group {
            display: flex;
            gap: 10px;
            flex-grow: 1;
        }

        button {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: #c9d1d9;
            padding: 10px 16px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.3s ease;
            flex: 1;
            text-align: center;
        }

        button:hover {
            background: rgba(255, 255, 255, 0.15);
            color: #fff;
            border-color: rgba(255, 255, 255, 0.4);
        }

        button.active {
            background: #fff;
            color: #0d1117;
            border-color: #fff;
            font-weight: 600;
            box-shadow: 0 0 15px rgba(255,255,255,0.3);
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
</head>
<body>

    <div id="canvas-container"></div>

    <div id="ui-panel">
        <div class="ui-section">
            <div class="ui-title">Option 1</div>
            <div class="btn-group">
                <button class="active" onclick="setOption1('calm')">Calm and Relaxed<br><small>Alpha 10Hz + Beta 15Hz</small></button>
                <button onclick="setOption1('tired')">A Bit Tired / Stressed<br><small>Theta 6Hz + Alpha 10Hz</small></button>
                <button onclick="setOption1('energized')">Energized / Motivated<br><small>Beta 20Hz + Gamma 40Hz</small></button>
            </div>
        </div>

        <div class="ui-section">
            <div class="ui-title">Option 2</div>
            <div class="btn-group">
                <button class="active" onclick="setOption2(1)">Just unwind and chill<br><small>Palette 1 (Silver Cyan)</small></button>
                <button onclick="setOption2(2)">Do something fun<br><small>Palette 2 (Zen Gold)</small></button>
                <button onclick="setOption2(3)">Stay active or go out<br><small>Palette 3 (High Contrast)</small></button>
            </div>
        </div>

        <div class="ui-section">
            <div class="ui-title">Option 3</div>
            <div class="btn-group">
                <button class="active" onclick="setOption3(1)">🌸 Sakura Pattern</button>
                <button onclick="setOption3(2)">🌿 Zen Leaf Pattern</button>
                <button onclick="setOption3(3)">🌊 Great Wave Pattern</button>
            </div>
        </div>
    </div>

    <script>
        // =================================================================
        // 🌌 WebGL / Three.js 基礎場景設置
        // =================================================================
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        const camera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        container.appendChild(renderer.domElement);

        // 🎛️ 初始 Uniforms 變數引腳
        const uniforms = {
            u_time: { value: 0 },
            u_resolution: { value: new THREE.Vector2(window.innerWidth, window.innerHeight) },
            u_wave_a: { value: 10.0 },
            u_wave_b: { value: 15.0 },
            u_space_multiplier_a: { value: 0.666 },
            u_space_multiplier_b: { value: 5.0 },
            u_palette_mode: { value: 1 }, // 1: chill, 2: fun, 3: active
            u_pattern_mode: { value: 1 }, // 1: sakura, 2: leaf, 3: wave
            u_color_speed: { value: 0.05 },
            u_contrast: { value: 0.5 },
            u_bg_min: { value: 0.08 },
            u_bg_max: { value: 0.8 }
        };

        // =================================================================
        // 🌿 大一統 Fragment Shader (100% 整合你的優化版本，拔除閃爍)
        // =================================================================
        const fragmentShader = `
            uniform float u_time;
            uniform vec2 u_resolution;
            uniform float u_wave_a;
            uniform float u_wave_b;
            uniform float u_space_multiplier_a;
            uniform float u_space_multiplier_b;
            uniform int u_palette_mode;
            uniform int u_pattern_mode;
            uniform float u_color_speed;
            uniform float u_contrast;
            uniform float u_bg_min;
            uniform float u_bg_max;

            const float BASE_MOVE_DURATION = 12.0;

            // 🎨 Color Palette 1: Just unwind and chill (你的經典原廠平衡底座)
            vec3 palette_chill(float t, vec3 bias) {
                vec3 a = vec3(0.5, 0.5, 0.5);
                vec3 b = vec3(u_contrast);
                vec3 c = vec3(1.0, 1.0, 1.0);
                vec3 d = vec3(0.0, 0.1, 0.2) + bias;
                return a + b * cos(6.283185 * (c * t + d));
            }

            // 🎨 Color Palette 2: Do something fun (🌟 你給的向日葵金黃配方)
            vec3 palette_fun(float t, vec3 bias) {
                vec3 a = vec3(0.4, 0.4, 0.4);
                vec3 b = vec3(0.55, 0.55, 0.55);
                vec3 c = vec3(1.0, 1.0, 0.5);
                vec3 d = vec3(0.8, 0.9, 0.3) + bias;
                return a + b * cos(6.283185 * (c * t + d));
            }

            // 🎨 Color Palette 3: Stay active or go out (大反差時間差配方)
            vec3 palette_active(float t, vec3 bias) {
                vec3 a = vec3(0.5, 0.5, 0.5);
                vec3 b = vec3(u_contrast);
                vec3 c = vec3(1.0, 1.0, 1.0);
                vec3 d = vec3(0.0, 0.1, 0.2) + bias + vec3(2.50);
                return a + b * cos(6.283185 * (c * t + d));
            }

            // 🛡️ 統一路由調色盤
            vec3 getPaletteColor(float t, vec3 bias) {
                if (u_palette_mode == 1) return palette_chill(t, bias);
                if (u_palette_mode == 2) return palette_fun(t, bias);
                return palette_active(t, bias);
            }

            void main() {
                vec2 vUv = gl_FragCoord.xy / u_resolution.xy;
                vec2 uv_center = (gl_FragCoord.xy * 2.0 - u_resolution.xy) / u_resolution.y;

                float timeScale = 50.0 / 30.0;
                float scaledTime = u_time * timeScale;

                vec3 baseSilverBg = vec3(0.85, 0.88, 0.91);
                float bg_t = vUv.x * 0.1 + vUv.y * 0.1 + (scaledTime * 0.6) * 0.2;
                vec3 backgroundColor = clamp(getPaletteColor(bg_t, vec3(0.0)), u_bg_min, u_bg_max);

                vec3 rippleLayerColorSum = vec3(0.0);
                float total_mix_weight = 0.0;
                float totalLoop = 50.0;

                // 🌸 PATTERN 1: SAKURA
                if (u_pattern_mode == 1) {
                    for(int i = 0; i < 4; i++) {
                        float timeOffset = float(i) * 3.0 + (float(i) * (float(i) - 1.0)) * 0.5;
                        float rippleTime = mod(scaledTime - timeOffset, totalLoop);
                        if (rippleTime < 0.0) rippleTime += totalLoop;
                        vec2 startCorner = (rippleTime < 25.0) ? vec2(1.5, 0.7) : vec2(-1.5, 0.7);
                        float stageTime = (rippleTime < 25.0) ? rippleTime : rippleTime - 25.0;

                        vec2 currentCenter = mix(startCorner + vec2(float(i)*0.03*sign(startCorner.x), float(i)*0.015), -(startCorner + vec2(float(i)*0.03*sign(startCorner.x), float(i)*0.015)), smoothstep(0.0, BASE_MOVE_DURATION, stageTime));
                        float flowerScale = (1.0 - float(i)*0.2) * mix(1.0, 0.03, smoothstep(0.0, 1.5, length(currentCenter)));
                        vec2 toCorner = uv_center - currentCenter;
                        float r = length(toCorner), angle = atan(toCorner.y, toCorner.x + 0.0001);
                        float sakuraShape = abs(sin(angle * 2.5)) * 0.7 + (1.0 - abs(cos(angle * 2.5))) * 0.25;
                        float base_d = (r / flowerScale) / (0.3 + 0.5 * sakuraShape);

                        float alpha_wave = sin(base_d * u_space_multiplier_a - stageTime * (1.5 * (u_wave_a / 6.0)));
                        float beta_wave  = sin(base_d * u_space_multiplier_b - stageTime * (3.5 * (u_wave_b / 10.0)));
                        float wave = (alpha_wave * 0.2) + (beta_wave * 0.02 * (alpha_wave + 1.0));
                        float final_glow = 0.01 / (abs(wave) + 0.025);

                        final_glow *= smoothstep(0.0, 1.5, stageTime) * (1.0 - smoothstep(12.0, 17.0, stageTime)) * exp(-base_d * 0.2);
                        float color_t = (scaledTime * 0.05 * 5.0) * (u_color_speed / 0.05) + float(i) * 0.25 + 2.5;
                        rippleLayerColorSum += getPaletteColor(color_t, vec3(float(i)*0.15, float(i)*0.08, float(i)*0.05)) * final_glow;
                        total_mix_weight += final_glow;
                    }
                }
                // 🌿 PATTERN 2: ZEN LEAF
                else if (u_pattern_mode == 2) {
                    float waveFreq = 1.2 * 0.6, waveAmp = 0.12, arcCurv = 0.65, veinThick = 0.012;
                    float ellipScale = 0.08 * 0.6, ellipRatioX = 30.0, ellipRatioY = 40.0, ellipThick1 = 0.03, ellipThick2 = 0.015, sharpen = 3.5;
                    float hz_slow = (scaledTime * 0.6) * (u_wave_a / 33.333), hz_fast = (scaledTime * 0.6) * (u_wave_b / 30.000);
                    float angle_radians = atan(5.0 / 9.0), ext_cos = cos(angle_radians), ext_sin = sin(angle_radians);

                    for(int i = 0; i < 4; i++) {
                        float timeOffset = float(i) * 3.0 + (float(i) * (float(i) - 1.0)) * 0.5;
                        float rippleTime = mod(scaledTime - timeOffset, totalLoop);
                        if (rippleTime < 0.0) rippleTime += totalLoop;
                        vec2 startCorner = (rippleTime < 25.0) ? vec2(1.5, 0.7) : vec2(-1.5, 0.7);
                        vec2 center1 = (rippleTime < 25.0) ? vec2(1.5, -1.3) : vec2(-1.5, -1.3);
                        vec2 center2 = (rippleTime < 25.0) ? vec2(-1.5, 1.3) : vec2(1.5, 1.3);
                        float stageTime = (rippleTime < 25.0) ? rippleTime : rippleTime - 25.0;

                        vec2 currentCenter = mix(startCorner, -startCorner, smoothstep(0.0, BASE_MOVE_DURATION, stageTime));
                        float leafScale = (1.0 - float(i)*0.2) * sin(clamp(stageTime / 14.0, 0.0, 1.0) * 3.14159);
                        leafScale = max(abs(leafScale), 0.001) * sign(leafScale);
                        vec2 toCorner = uv_center - currentCenter;
                        float moveAngle = atan(-startCorner.y * 2.0, -startCorner.x * 2.0);
                        vec2 leaf_uv = vec2(toCorner.x * cos(moveAngle) + toCorner.y * sin(moveAngle), -toCorner.x * sin(moveAngle) + toCorner.y * cos(moveAngle));
                        leaf_uv.y += sin(leaf_uv.x * waveFreq) * waveAmp * leafScale;
                        float v_arc = (leaf_uv.x - sqrt(abs(leaf_uv.y)) * arcCurv) / leafScale;

                        float leaf_glow = (0.6 / (abs(sin((v_arc * 0.6) * u_space_multiplier_a - hz_slow)) + 0.4) * 0.3 + 0.25 / (abs(sin((v_arc * 1.5) * u_space_multiplier_a - hz_fast)) + 0.15) * 0.4);
                        leaf_glow += (veinThick / (abs(leaf_uv.y / leafScale) + veinThick)) * smoothstep(1.0, 0.0, leaf_uv.x / leafScale);

                        float current_sin = (rippleTime < 25.0) ? ext_sin : -ext_sin;
                        float ellipse_glow = 0.0; vec2 centers[2]; centers[0] = center1; centers[1] = center2;
                        for(int j = 0; j < 2; j++) {
                            vec2 toC = uv_center - centers[j];
                            vec2 rot = vec2(toC.x * ext_cos + toC.y * current_sin, -toC.x * current_sin + toC.y * ext_cos);
                            float d = sqrt(rot.x * rot.x * ellipRatioX + rot.y * rot.y * ellipRatioY) * ellipScale;
                            float g1 = pow(ellipThick1 / (abs(sin((d * 0.8) * u_space_multiplier_b - hz_fast * 1.6)) + ellipThick1), 2.0);
                            float g2 = pow(ellipThick2 / (abs(sin((d * 2.5) * u_space_multiplier_b - hz_fast * 4.0)) + ellipThick2), 2.0);
                            ellipse_glow += (g1 + g2) * exp(-d * 0.5) * 0.35 * sharpen;
                        }
                        float global_env = smoothstep(1.8, 0.0, abs(uv_center.x * ext_sin - uv_center.y * ext_cos) * 0.4);
                        float time_env = smoothstep(0.0, 1.0, stageTime) * (1.0 - smoothstep(12.0, 17.0, stageTime));
                        float color_t = (scaledTime * 0.05 * 5.0) * (u_color_speed / 0.05) + float(i) * 0.25 + 2.5;

                        rippleLayerColorSum += (getPaletteColor(color_t, vec3(float(i)*0.05)) * leaf_glow + getPaletteColor(color_t + 0.5, vec3(float(i)*0.05)) * ellipse_glow) * time_env * global_env;
                        total_mix_weight += (leaf_glow + ellipse_glow) * time_env * global_env;
                    }
                }
                // 🌊 PATTERN 3: GREAT WAVE (🌟 3層迴圈、5.0倍流速黃金版)
                else if (u_pattern_mode == 3) {
                    float mod_speed_wave1 = 2.0 * (u_wave_a / 20.0), mod_speed_wave2 = 3.0 * (u_wave_b / 40.0);
                    for(int i = 0; i < 3; i++) {
                        float timeOffset = float(i) * 8.0 + (float(i) * (float(i) - 1.0)) * 0.5;
                        float rippleTime = mod(scaledTime - timeOffset, totalLoop);
                        if (rippleTime < 0.0) rippleTime += totalLoop;
                        vec2 startCorner = (rippleTime < 25.0) ? vec2(-1.5, -0.7) : vec2(1.5, -0.7);
                        float stageTime = (rippleTime < 25.0) ? rippleTime : rippleTime - 25.0;

                        vec2 currentCenter = mix(startCorner + vec2(float(i)*0.05*sign(startCorner.x), -float(i)*0.03), -(startCorner + vec2(float(i)*0.05*sign(startCorner.x), -float(i)*0.03)), smoothstep(0.0, BASE_MOVE_DURATION, stageTime));
                        float waveScale = (1.0 - float(i)*0.15) * mix(1.0, 0.1, smoothstep(0.0, 1.8, length(currentCenter)));
                        vec2 toCenter = uv_center - currentCenter;
                        float r = length(toCenter), angle = atan(toCenter.y, toCenter.x + 0.0001), twist = 1.5 / (r + 0.1);
                        float twistedAngle = angle + twist * (-sign(startCorner.x)) - stageTime * 0.5 * (u_wave_a / 20.0);
                        float waveShape = pow(abs(sin(twistedAngle * 1.0)), 0.5) * sign(sin(twistedAngle * 1.0));
                        float base_d = (r / waveScale) / (0.4 + 0.4 * waveShape);

                        float wave1 = sin(base_d * u_space_multiplier_a - stageTime * mod_speed_wave1);
                        float wave2 = sin(base_d * u_space_multiplier_b - stageTime * mod_speed_wave2);
                        float PAC_wave = (wave1 * 0.2) + (wave2 * 0.02 * (wave1 + 1.0));
                        float layer_glow = 0.01 / (abs(PAC_wave) + 0.025);

                        layer_glow *= smoothstep(0.0, 1.5, stageTime) * (1.0 - smoothstep(12.0, 17.0, stageTime)) * exp(-base_d * 0.15);
                        float color_t = (scaledTime * 0.05 * 5.0) * (u_color_speed / 0.05) + float(i) * 0.3 + 2.5;
                        rippleLayerColorSum += getPaletteColor(color_t, vec3(float(i)*0.12, float(i)*0.06, float(i)*0.15)) * layer_glow;
                        total_mix_weight += layer_glow;
                    }
                }

                float rippleMixControl = 1.0 - exp(-total_mix_weight * 1.5);
                vec3 finalColor = mix(backgroundColor, rippleLayerColorSum / (total_mix_weight + 0.001), rippleMixControl);
                finalColor = mix(vec3(0.5), finalColor, 1.02);
                gl_FragColor = vec4(mix(baseSilverBg, pow(max(finalColor, vec3(0.0)), vec3(1.0 / 2.2)), 1.0), 1.0);
            }
        `;

        // =================================================================
        // 🚀 建立網格材質與渲染
        // =================================================================
        const geometry = new THREE.PlaneGeometry(2, 2);
        const material = new THREE.ShaderMaterial({
            uniforms: uniforms,
            fragmentShader: fragmentShader,
            depthWrite: false,
            depthTest: false
        });
        const mesh = new THREE.Mesh(geometry, material);
        scene.add(mesh);

        // ⏱️ 動態渲染循環
        const clock = new THREE.Clock();
        function animate() {
            requestAnimationFrame(animate);
            uniforms.u_time.value = clock.getElapsedTime();
            renderer.render(scene, camera);
        }
        animate();

        // =================================================================
        // 🎛️ 前端互動邏輯 (與 Miro 圖對齊)
        // =================================================================
        
        // Option 1 改變腦波頻率
        function setOption1(mode) {
            updateActiveButton(0, mode);
            if (mode === 'calm') {
                gsap.to(uniforms.u_wave_a, { value: 10.0, duration: 1.5 });
                gsap.to(uniforms.u_wave_b, { value: 15.0, duration: 1.5 });
            } else if (mode === 'tired') {
                gsap.to(uniforms.u_wave_a, { value: 6.0, duration: 1.5 });
                gsap.to(uniforms.u_wave_b, { value: 10.0, duration: 1.5 });
            } else if (mode === 'energized') {
                gsap.to(uniforms.u_wave_a, { value: 20.0, duration: 1.5 });
                gsap.to(uniforms.u_wave_b, { value: 40.0, duration: 1.5 });
            }
        }

        // Option 2 獨立變更調色盤
        function setOption2(paletteIndex) {
            updateActiveButton(1, paletteIndex);
            uniforms.u_palette_mode.value = paletteIndex;
        }

        // Option 3 獨立變更幾何圖騰 (並根據你滿意的疏密比初始化)
        function setOption3(patternIndex) {
            updateActiveButton(2, patternIndex);
            uniforms.u_pattern_mode.value = patternIndex;
            
            // 🌸 櫻花密度初始化
            if (patternIndex === 1) {
                gsap.to(uniforms.u_space_multiplier_a, { value: 0.666, duration: 1.0 });
                gsap.to(uniforms.u_space_multiplier_b, { value: 5.0, duration: 1.0 });
            } 
            // 🌿 樹葉 0.7 寬鬆留白版初始化
            else if (patternIndex === 2) {
                gsap.to(uniforms.u_space_multiplier_a, { value: 0.7, duration: 1.0 });
                gsap.to(uniforms.u_space_multiplier_b, { value: 0.7, duration: 1.0 });
            } 
            // 🌊 海浪 1.7 倍密版幾何初始化
            else if (patternIndex === 3) {
                gsap.to(uniforms.u_space_multiplier_a, { value: 1.5, duration: 1.0 });
                gsap.to(uniforms.u_space_multiplier_b, { value: 15.0, duration: 1.0 });
            }
        }

        // 樣式：輔助切換 Active UI 按鈕
        function updateActiveButton(sectionIndex, modeOrId) {
            const sections = document.querySelectorAll('.ui-section');
            const buttons = sections[sectionIndex].querySelectorAll('button');
            buttons.forEach((btn, idx) => {
                const isMatch = (typeof modeOrId === 'string' && btn.getAttribute('onclick').includes(modeOrId)) ||
                                (typeof modeOrId === 'number' && btn.getAttribute('onclick').includes(modeOrId.toString()));
                if (isMatch) btn.classList.add('active');
                else btn.classList.remove('active');
            });
        }

        // 📐 自動滿版視窗縮放
        window.addEventListener('resize', () => {
            renderer.setSize(window.innerWidth, window.innerHeight);
            uniforms.u_resolution.value.set(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
