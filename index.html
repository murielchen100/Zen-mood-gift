<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zen Mood Gift - Personalized Interactive Experience</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }
        body, html { width: 100%; height: 100%; overflow: hidden; background-color: #e0e0e0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        #webgl-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        #silver-mirror-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 2; background: transparent; transition: opacity 2.5s cubic-bezier(0.4, 0, 0.2, 1); pointer-events: none; }
        #theater-mask { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 3; background-color: rgba(0, 0, 0, 0.65); opacity: 0; transition: opacity 1.5s ease; pointer-events: none; }
        #ui-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 4; display: flex; justify-content: center; align-items: center; pointer-events: none; }
        
        /breathing effect chatbox/
        .cloud-box { 
            position: absolute; 
            background: rgba(255, 255, 255, 0.12); 
            backdrop-filter: blur(12px); 
            -webkit-backdrop-filter: blur(12px); 
            border: 1px solid rgba(255, 255, 255, 0.2); 
            padding: 2.5rem 3.5rem; 
            border-radius: 24px; 
            color: #333; 
            text-align: center; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.1); 
            pointer-events: auto; 
            opacity: 0; 
            transform: translateY(20px) scale(0.95); 
            transition: opacity 1.5s ease, transform 1.5s ease, color 1.5s ease; 
            animation: floatingBump 6s ease-in-out infinite alternate; 
        }
        .cloud-box.dark-mode { color: #fff; background: rgba(0, 0, 0, 0.2); border-color: rgba(255, 255, 255, 0.15); box-shadow: 0 20px 40px rgba(0,0,0,0.4); }
        
        @keyframes floatingBump { 
            0% { transform: translateY(0px) rotate(0deg); } 
            50% { transform: translateY(-12px) rotate(0.6deg) scale(1.015); } 
            100% { transform: translateY(6px) rotate(-0.4deg); } 
        }
        
        .cloud-box.show { opacity: 1; transform: translateY(0) scale(1); }
        .cloud-box.fade-fast { transition: opacity 0.3s ease, transform 0.3s ease !important; opacity: 0 !important; transform: scale(0.9) !important; }
        h2 { font-size: 1.8rem; margin-bottom: 1.5rem; letter-spacing: 1px; font-weight: 400; }
        .options-list { display: flex; flex-direction: column; gap: 12px; min-width: 280px; }
        
        .btn-option { background: rgba(0, 0, 0, 0.05); border: 1px solid rgba(0, 0, 0, 0.15); color: #333; padding: 14px 20px; border-radius: 14px; font-size: 1rem; cursor: pointer; transition: all 0.25s ease; text-align: center; }
        .cloud-box.dark-mode .btn-option { background: rgba(255, 255, 255, 0.15); border-color: rgba(255, 255, 255, 0.25); color: #fff; }
        .btn-option:hover { background: rgba(0, 0, 0, 0.1); border-color: #333; transform: translateY(-2px); }
        .cloud-box.dark-mode .btn-option:hover { background: rgba(255, 255, 255, 0.3); border-color: #fff; }
        
        #recording-ui {
            position: absolute;
            bottom: 24px;
            right: 24px;
            z-index: 5;
            background: rgba(0, 0, 0, 0.6);
            color: #fff;
            padding: 10px 18px;
            border-radius: 30px;
            font-size: 0.9rem;
            letter-spacing: 0.5px;
            display: none;
            align-items: center;
            gap: 8px;
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255,255,255,0.1);
        }
        #recording-dot {
            width: 8px;
            height: 8px;
            background-color: #ff4d4d;
            border-radius: 50%;
            animation: pulse 1s infinite alternate;
        }
        @keyframes pulse { from { opacity: 0.3; } to { opacity: 1; } }
        .btn-download {
            background: #27ae60 !important;
            color: white !important;
            border-color: #219653 !important;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(39, 174, 96, 0.4);
        }
        .btn-download:hover {
            background: #219653 !important;
            transform: translateY(-2px);
        }
    </style>
</head>
<body>
    <canvas id="webgl-canvas"></canvas>
    <div id="silver-mirror-overlay"></div>
    <div id="theater-mask"></div>
    <div id="recording-ui">
        <div id="recording-dot"></div>
        <span id="recording-text">Recording for 30 sec</span>
    </div>
    <div id="ui-container">
        <div id="dialog-box" class="cloud-box">
            <h2 id="dialog-text">Hello there ...</h2>
            <div id="options-container" class="options-list" style="display: none;"></div>
        </div>
    </div>

    <script>
       
        // SHADER CODES SECTION
        
        const vertexShaderCode = `
            varying vec2 vUv;
            void main() { vUv = uv; gl_Position = vec4(position, 1.0); }
        `;

        const paletteSharedGLSL = `
            uniform vec2 iResolution;
            uniform float iTime;
            uniform float u_mode;           
            uniform float u_palette_choice; // 1=Active/GoOut, 2=Fun, 3=Chill
            uniform float u_wave_a;
            uniform float u_wave_b;
            uniform float u_space_multiplier_a;
            uniform float u_space_multiplier_b;
            uniform float u_bg_min;
            uniform float u_bg_max;
            uniform float u_silver_mode;
            varying vec2 vUv;

            // Option 2  color palette zone
            vec3 palette(float t, vec3 bias) {
                if (u_palette_choice < 1.5) {
                    //  Palette 1  --> Stay active or go out (強力反差色配方)
                    vec3 a = vec3(0.5, 0.5, 0.5); vec3 b = vec3(0.65, 0.65, 0.65);
                    vec3 c = vec3(1.3, 1.0, 0.7); vec3 d = vec3(0.0, 0.33, 0.66) + bias + vec3(2.50);
                    return a + b * cos(6.283185 * (c * t + d));
                } else if (u_palette_choice < 2.5) {
                    //  Palette 2  --> Do something fun ( 向日葵金黃配方)
                    vec3 a = vec3(0.4, 0.4, 0.4); vec3 b = vec3(0.55, 0.55, 0.55);
                    vec3 c = vec3(1.0, 1.0, 0.5); vec3 d = vec3(0.8, 0.9, 0.3) + bias;
                    return a + b * cos(6.283185 * (c * t + d));
                } else {
                    //  Palette 3  --> Just unwind and chill (平衡柔和藍綠)
                    vec3 a = vec3(0.5, 0.5, 0.5); vec3 b = vec3(0.5, 0.5, 0.5);
                    vec3 c = vec3(1.0, 1.0, 1.0); vec3 d = vec3(0.0, 0.1, 0.2) + bias;
                    return a + b * cos(6.283185 * (c * t + d));
                }
            }
        `;

        //  1. flower shader
        const flowerFragmentCode = paletteSharedGLSL + `
            const float BASE_MOVE_DURATION = 12.0;
            void main() {
                vec2 uv_center = (vUv * 2.0 - 1.0);
                uv_center.x *= iResolution.x / (iResolution.y + 0.0001);
                
                vec3 baseSilverBg = vec3(0.85, 0.88, 0.91);
                float timeScale = 50.0 / 30.0;
                float scaledTime = iTime * timeScale;

                float bg_t = vUv.x * 0.1 + vUv.y * 0.1 + (scaledTime * 0.6) * 0.2;
                vec3 backgroundColor = clamp(palette(bg_t, vec3(0.0)), u_bg_min, u_bg_max);
                vec3 rippleLayerColorSum = vec3(0.0);
                float total_mix_weight = 0.0;
                float totalLoop = 50.0;

                for(int i = 0; i < 4; i++) {
                    float timeOffset = float(i) * 3.0 + (float(i) * (float(i) - 1.0)) * 0.5;
                    float rippleTime = mod(scaledTime - timeOffset, totalLoop);
                    if (rippleTime < 0.0) rippleTime += totalLoop;
                    
                    vec2 startCorner = (rippleTime < 25.0) ? vec2(1.5, 0.7) : vec2(-1.5, 0.7);
                    float stageTime = (rippleTime < 25.0) ? rippleTime : rippleTime - 25.0;
                    
                    vec2 posOffset = vec2(float(i) * 0.03 * sign(startCorner.x), float(i) * 0.015);
                    vec2 shiftedStart = startCorner + posOffset;
                    vec3 colorBias = vec3(float(i) * 0.15, float(i) * 0.08, float(i) * 0.05);
                    
                    float moveProgress = smoothstep(0.0, BASE_MOVE_DURATION, stageTime);
                    vec2 currentCenter = mix(shiftedStart, -shiftedStart, moveProgress);
                    
                    float flowerScale = (1.0 - float(i) * 0.2) * mix(1.0, 0.03, smoothstep(0.0, 1.5, length(currentCenter)));
                    vec2 toCorner = uv_center - currentCenter;
                    float r = length(toCorner), angle = atan(toCorner.y, toCorner.x + 0.0001);
                    
                    float sakuraShape = abs(sin(angle * 2.5)) * 0.7 + (1.0 - abs(cos(angle * 2.5))) * 0.25;
                    float base_d = (r / flowerScale) / (0.3 + 0.5 * sakuraShape);
                    
                    float alpha_wave = sin(base_d * u_space_multiplier_a - stageTime * (1.5 * (u_wave_a / 6.0)));
                    float beta_wave  = sin(base_d * u_space_multiplier_b - stageTime * (3.5 * (u_wave_b / 10.0)));
                    float wave = (alpha_wave * 0.2) + (beta_wave * 0.02 * (alpha_wave + 1.0));
                    
                    float final_glow = 0.01 / (abs(wave) + 0.025);
                    final_glow *= smoothstep(0.0, 1.5, stageTime) * (1.0 - smoothstep(12.0, 17.0, stageTime)) * exp(-base_d * 0.2);
                    
                    float color_t = (scaledTime * 0.05 * 5.0) + float(i) * 0.25 + 2.5;
                    rippleLayerColorSum += palette(color_t, colorBias) * final_glow;
                    total_mix_weight += final_glow;
                }
                float rippleMixControl = 1.0 - exp(-total_mix_weight * 1.5);
                vec3 finalColor = mix(backgroundColor, rippleLayerColorSum / (total_mix_weight + 0.001), rippleMixControl);
                finalColor = mix(vec3(0.5), finalColor, 1.02);
                gl_FragColor = vec4(mix(baseSilverBg, pow(max(finalColor, vec3(0.0)), vec3(1.0 / 2.2)), u_silver_mode), 1.0);
            }
        `;

        //  2. leave shader
        const leafFragmentCode = paletteSharedGLSL + `
            const float BASE_MOVE_DURATION = 12.0;
            void main() {
                float waveFreq = 1.2; float waveAmp = 0.12; float arcCurv = 0.65; 
                float veinThick = 0.005; float ellipScale = 0.08; 
                float ellipRatioX = 30.0; float ellipRatioY = 40.0;
                float ellipThick1 = 0.03; float ellipThick2 = 0.015; float sharpen = 3.5;
                
                float timeScale = 50.0 / 30.0;
                float scaledTime = iTime * timeScale;
                vec2 uv_center = (vUv * 2.0 - 1.0);
                uv_center.x *= iResolution.x / (iResolution.y + 0.0001);
                
                vec3 baseSilverBg = vec3(0.85, 0.88, 0.91);
                float hz_slow = (scaledTime * 0.6) * (u_wave_a / 33.333);
                float hz_fast = (scaledTime * 0.6) * (u_wave_b / 30.000);
                
                float bg_t = vUv.x * 0.1 + vUv.y * 0.1 + (scaledTime * 0.6) * 0.2;
                vec3 backgroundColor = clamp(palette(bg_t, vec3(0.0)), u_bg_min, u_bg_max);
                vec3 rippleLayerColorSum = vec3(0.0);
                float total_mix_weight = 0.0;
                float totalLoop = 50.0;
                
                float angle_radians = atan(5.0 / 9.0);
                float ext_cos = cos(angle_radians); float ext_sin = sin(angle_radians);
                
                for(int i = 0; i < 4; i++) {
                    float timeOffset = float(i) * 3.0 + (float(i) * (float(i) - 1.0)) * 0.5;
                    float rippleTime = mod(scaledTime - timeOffset, totalLoop);
                    if (rippleTime < 0.0) rippleTime += totalLoop;
                    
                    vec2 startCorner = (rippleTime < 25.0) ? vec2(1.5, 0.7) : vec2(-1.5, 0.7);
                    vec2 center1 = (rippleTime < 25.0) ? vec2(1.5, -1.3) : vec2(-1.5, -1.3);
                    vec2 center2 = (rippleTime < 25.0) ? vec2(-1.5, 1.3) : vec2(1.5, 1.3);
                    float stageTime = (rippleTime < 25.0) ? rippleTime : rippleTime - 25.0;
                    
                    vec2 currentCenter = mix(startCorner, -startCorner, smoothstep(0.0, BASE_MOVE_DURATION, stageTime));
                    
                    // 原基礎上乘以 0.65，縮小葉子形體範圍
                    float leafScale = (1.0 - float(i) * 0.2) * sin(clamp(stageTime / 14.0, 0.0, 1.0) * 3.14159) * 0.65;
                    leafScale = max(abs(leafScale), 0.001) * sign(leafScale);
                    
                    vec2 toCorner = uv_center - currentCenter;
                    vec2 leaf_uv = vec2(toCorner.x * ext_cos + toCorner.y * ext_sin, -toCorner.x * ext_sin + toCorner.y * ext_cos);
                    
                    leaf_uv.y += sin(leaf_uv.x * waveFreq) * waveAmp * leafScale;
                    float v_arc = (leaf_uv.x - sqrt(abs(leaf_uv.y)) * arcCurv) / leafScale;
                    
                    float leaf_glow = (0.01 / (abs(sin(v_arc * 0.6 - hz_slow)) + 0.025) * 0.3 + 
                                       0.01 / (abs(sin(v_arc * 1.5 - hz_fast)) + 0.025) * 0.4);
                                       
                    leaf_glow += (veinThick / (abs(leaf_uv.y / leafScale) + veinThick)) * smoothstep(1.0, 0.0, leaf_uv.x / leafScale);
                    
                    float current_sin = (rippleTime < 25.0) ? ext_sin : -ext_sin;
                    float ellipse_glow = 0.0; vec2 centers[2]; centers[0] = center1; centers[1] = center2;
                    for(int j = 0; j < 2; j++) {
                        vec2 toC = uv_center - centers[j];
                        vec2 rot = vec2(toC.x * ext_cos + toC.y * current_sin, -toC.x * current_sin + toC.y * ext_cos);
                        
                        float d = sqrt(rot.x * rot.x * ellipRatioX + rot.y * rot.y * ellipRatioY) * (ellipScale * 1.3);
                        // 橢圓速度精確放慢至 1/3
                        float slow_hz_fast = hz_fast / 3.0;
                        
                        float g1 = pow(0.015 / (abs(sin(d * 0.8 - slow_hz_fast * 1.6)) + 0.025), 1.8);
                        float g2 = pow(0.010 / (abs(sin(d * 2.5 - slow_hz_fast * 4.0)) + 0.025), 1.8);
                        ellipse_glow += (g1 + g2) * exp(-d * 0.5) * 0.35 * sharpen;
                    }
                    float global_env = smoothstep(1.8, 0.0, abs(uv_center.x * ext_sin - uv_center.y * ext_cos) * 0.4);
                    float time_env = smoothstep(0.0, 1.0, stageTime) * (1.0 - smoothstep(12.0, 17.0, stageTime));
                    
                    float color_t = (scaledTime * 0.05 * 5.0) + float(i) * 0.25 + 2.5;
                    rippleLayerColorSum += (palette(color_t, vec3(0.0)) * leaf_glow + palette(color_t + 0.5, vec3(0.0)) * ellipse_glow) * time_env * global_env;
                    total_mix_weight += (leaf_glow + ellipse_glow) * time_env * global_env;
                }
                vec3 finalColor = mix(backgroundColor, rippleLayerColorSum / (total_mix_weight + 0.001), 1.0 - exp(-total_mix_weight * 1.5));
                finalColor = mix(vec3(0.5), finalColor, 1.02);
                finalColor = pow(max(finalColor, vec3(0.0)), vec3(1.0 / 2.2));
                gl_FragColor = vec4(mix(baseSilverBg, finalColor, u_silver_mode), 1.0);
            }
        `;

        //  3. wave shader
        const waveFragmentCode = paletteSharedGLSL + `
            const float BASE_MOVE_DURATION = 12.0;
            const float BASE_SPEED_TWIST = 0.5;
            const float BASE_SPEED_WAVE1 = 2.0;
            const float BASE_SPEED_WAVE2 = 3.0;
            void main() {
                vec2 uv_center = (vUv * 2.0 - 1.0);
                uv_center.x *= iResolution.x / (iResolution.y + 0.0001);
                
                float timeScale = 50.0 / 30.0;
                float scaledTime = iTime * timeScale;
                vec3 baseSilverBg = vec3(0.85, 0.88, 0.91);
                
                float bg_t = vUv.x * 0.1 + vUv.y * 0.1 + (scaledTime * 0.6) * 0.2;
                vec3 backgroundColor = clamp(palette(bg_t, vec3(0.0)), u_bg_min, u_bg_max);
                vec3 rippleLayerColorSum = vec3(0.0);
                float total_mix_weight = 0.0;
                float totalLoop = 50.0;
                
                float mod_speed_wave1 = BASE_SPEED_WAVE1 * (u_wave_a / 20.0);
                float mod_speed_wave2 = BASE_SPEED_WAVE2 * (u_wave_b / 40.0);
                
                for(int i = 0; i < 3; i++) {
                    float timeInterval = 8.0;
                    float timeOffset = float(i) * timeInterval + (float(i) * (float(i) - 1.0)) * 0.5;
                    float rippleTime = mod(scaledTime - timeOffset, totalLoop);
                    if (rippleTime < 0.0) rippleTime += totalLoop;
                    
                    vec2 startCorner = (rippleTime < 25.0) ? vec2(-1.5, -0.7) : vec2(1.5, -0.7);
                    float stageTime = (rippleTime < 25.0) ? rippleTime : rippleTime - 25.0;
                    
                    vec2 posOffset = vec2(float(i) * 0.05 * sign(startCorner.x), -float(i) * 0.03);
                    vec2 shiftedStart = startCorner + posOffset;
                    vec3 colorBias = vec3(float(i) * 0.12, float(i) * 0.06, float(i) * 0.15);
                    
                    float moveProgress = smoothstep(0.0, BASE_MOVE_DURATION, stageTime);
                    vec2 currentCenter = mix(shiftedStart, -shiftedStart, moveProgress);
                    
                    float waveScale = (1.0 - float(i) * 0.15) * mix(1.0, 0.1, smoothstep(0.0, 1.8, length(currentCenter)));
                    vec2 toCenter = uv_center - currentCenter;
                    
                    float r = length(toCenter), angle = atan(toCenter.y, toCenter.x + 0.0001), twist = 1.5 / (r + 0.1);
                    float twistedAngle = angle + twist * (-sign(startCorner.x)) - stageTime * BASE_SPEED_TWIST * (u_wave_a / 20.0);
                    float waveShape = sin(twistedAngle * 1.0);
                    waveShape = pow(abs(waveShape), 0.5) * sign(waveShape);
                    float base_d = (r / waveScale) / (0.4 + 0.4 * waveShape);
                    
                    float wave1 = sin(base_d * u_space_multiplier_a - stageTime * mod_speed_wave1);
                    float wave2 = sin(base_d * u_space_multiplier_b - stageTime * mod_speed_wave2);
                    float PAC_wave = (wave1 * 0.2) + (wave2 * 0.02 * (wave1 + 1.0));
                    float layer_glow = 0.01 / (abs(PAC_wave) + 0.025);

                    layer_glow *= smoothstep(0.0, 1.5, stageTime) * (1.0 - smoothstep(12.0, 17.0, stageTime)) * exp(-base_d * 0.15);
                    
                    float color_t = (scaledTime * 0.05 * 5.0) + float(i) * 0.3 + 2.5;
                    rippleLayerColorSum += palette(color_t, colorBias) * layer_glow;
                    total_mix_weight += layer_glow;
                }
                float rippleMixControl = 1.0 - exp(-total_mix_weight * 1.5);
                vec3 finalColor = mix(backgroundColor, rippleLayerColorSum / (total_mix_weight + 0.001), rippleMixControl);
                finalColor = mix(vec3(0.5), finalColor, 1.02);
                finalColor = pow(max(finalColor, vec3(0.0)), vec3(1.0 / 2.2));
                gl_FragColor = vec4(mix(baseSilverBg, finalColor, u_silver_mode), 1.0);
            }
        `;

        
        // THREE.JS 引擎引腳初始化
    
        const canvas = document.getElementById('webgl-canvas');
        const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, preserveDrawingBuffer: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        
        const scene = new THREE.Scene();
        const camera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);
        const geometry = new THREE.PlaneGeometry(2, 2);
        
        const shaderUniforms = {
            iResolution: { value: new THREE.Vector2(window.innerWidth, window.innerHeight) },
            iTime: { value: 0 },
            u_mode: { value: 0.0 },
            u_palette_choice: { value: 3.0 }, // acffecter Palette 3 (Just unwind and chill)
            u_wave_a: { value: 10.0 },
            u_wave_b: { value: 15.0 },
            u_space_multiplier_a: { value: 0.666 },
            u_space_multiplier_b: { value: 5.000 },
            // 全局統一卡死在最完美的明暗護欄邊界
            u_bg_min: { value: 0.01 },
            u_bg_max: { value: 0.60 },
            u_silver_mode: { value: 0.0 }
        };
        
        let shaderMaterial = new THREE.ShaderMaterial({
            vertexShader: vertexShaderCode,
            fragmentShader: flowerFragmentCode,
            uniforms: shaderUniforms,
            depthWrite: false, depthTest: false
        });
        
        const mesh = new THREE.Mesh(geometry, shaderMaterial);
        scene.add(mesh);

        window.addEventListener('resize', () => {
            renderer.setSize(window.innerWidth, window.innerHeight);
            shaderUniforms.iResolution.value.set(window.innerWidth, window.innerHeight);
        });

        let isShaderRunning = false;
        const clock = new THREE.Clock();
        clock.stop();

        function animate() {
            requestAnimationFrame(animate);
            if (isShaderRunning) {
                shaderUniforms.iTime.value = clock.getElapsedTime();
            }
            renderer.render(scene, camera);
        }
        animate();

       
        //  故事引導故事流 DOM 與核心邏輯控制
        
        const dialogBox = document.getElementById('dialog-box');
        const dialogText = document.getElementById('dialog-text');
        const optionsContainer = document.getElementById('options-container');
        const theaterMask = document.getElementById('theater-mask');
        const recordingUI = document.getElementById('recording-ui');
        const recordingText = document.getElementById('recording-text');
        const delay = ms => new Promise(res => setTimeout(res, ms));
        
        let selectedWaveA = 10.0;
        let selectedWaveB = 15.0;
        let selectedType = 'flower';

        async function updateDialogText(text) {
            dialogBox.classList.remove('show');
            await delay(1500);
            dialogText.innerText = text;
            dialogBox.classList.add('show');
        }

        async function startFlow() {
            await delay(500);
            dialogBox.classList.add('show');
            await delay(2000);
            await updateDialogText("How's your day?");
            await delay(2000);
            await updateDialogText("Just take a breathe, and tell us ...");
            await delay(2000);
            showOption1();
        }

        //  Option 1: brain wave / mood
        async function showOption1() {
            dialogBox.classList.remove('show');
            await delay(1500);
            dialogText.innerText = "How do you feel right now?";
            optionsContainer.innerHTML = `
                <div class="btn-option" onclick="handleSelectOption1(0)">1. calm and relaxed</div>
                <div class="btn-option" onclick="handleSelectOption1(1)">2. a bit tired or stressed</div>
                <div class="btn-option" onclick="handleSelectOption1(2)">3. energized and motivated</div>
            `;
            optionsContainer.style.display = "flex";
            dialogBox.classList.add('show');
        }

        function handleSelectOption1(mode) {
            dialogBox.classList.add('fade-fast');
            shaderUniforms.u_mode.value = parseFloat(mode);
            selectedWaveA = (mode === 0) ? 10.0 : (mode === 1) ? 6.0 : 20.0;
            selectedWaveB = (mode === 0) ? 15.0 : (mode === 1) ? 10.0 : 40.0;
            
            setTimeout(async () => {
                optionsContainer.style.display = "none";
                dialogBox.classList.remove('fade-fast');
                dialogText.innerText = "What are you planning to do next ?";
                dialogBox.classList.add('show');
                await delay(2000);
                showOption2();
            }, 300);
        }

        //  Option 2: color palette connection 
        async function showOption2() {
            dialogBox.classList.remove('show');
            await delay(1500);
            dialogText.innerText = "Choose a vibe for your next step:";
            optionsContainer.innerHTML = `
                <div class="btn-option" onclick="handleSelectOption2(3)">1. Just unwind and chill</div>
                <div class="btn-option" onclick="handleSelectOption2(2)">2. Do something fun</div>
                <div class="btn-option" onclick="handleSelectOption2(1)">3. Stay active or go out</div>
            `;
            optionsContainer.style.display = "flex";
            dialogBox.classList.add('show');
        }

        function handleSelectOption2(paletteIndex) {
            dialogBox.classList.add('fade-fast');
            shaderUniforms.u_palette_choice.value = parseFloat(paletteIndex);

            setTimeout(() => {
                optionsContainer.style.display = "none";
                dialogBox.classList.remove('fade-fast');
                showOption3();
            }, 300);
        }

        //  Option 3: symbol connect
        async function showOption3() {
            dialogText.innerText = "Pick a symbol that guides you:";
            optionsContainer.innerHTML = `
                <div class="btn-option" onclick="handleSelectOption3('flower')">🌸 Sakura Flower</div>
                <div class="btn-option" onclick="handleSelectOption3('leaf')">🌿 Zen Leaf</div>
                <div class="btn-option" onclick="handleSelectOption3('wave')">🌊 Great Wave</div>
            `;
            optionsContainer.style.display = "flex";
            dialogBox.classList.add('show');
        }

        function handleSelectOption3(type) {
            dialogBox.classList.add('fade-fast');
            selectedType = type;
            
            if(type === 'flower') { 
                mesh.material.fragmentShader = flowerFragmentCode; 
                shaderUniforms.u_space_multiplier_a.value = 0.666;
                shaderUniforms.u_space_multiplier_b.value = 5.000;
            }
            else if(type === 'leaf') { 
                mesh.material.fragmentShader = leafFragmentCode; 
                // 還原樹葉正宗原比例
                shaderUniforms.u_space_multiplier_a.value = 1.000;
                shaderUniforms.u_space_multiplier_b.value = 1.000;
            }
            else if(type === 'wave') { 
                mesh.material.fragmentShader = waveFragmentCode; 
                shaderUniforms.u_space_multiplier_a.value = 1.500;
                shaderUniforms.u_space_multiplier_b.value = 15.00;
            }
            
            shaderUniforms.u_wave_a.value = selectedWaveA;
            shaderUniforms.u_wave_b.value = selectedWaveB;
            mesh.material.needsUpdate = true;
            
            setTimeout(async () => {
                optionsContainer.style.display = "none";
                dialogBox.classList.remove('fade-fast');
                dialogText.innerText = "A moment before the gift ...";
                
                theaterMask.style.opacity = '1';
                dialogBox.classList.add('dark-mode');
                dialogBox.classList.add('show');
                
                await delay(3000);
                
                shaderUniforms.u_silver_mode.value = 1.0;
                isShaderRunning = true;
                clock.start();
                
                //  activate media recorder for 30 sec
                startVideoRecording();
                await updateDialogText("And here you are !");
                await delay(2000);
                
                dialogBox.classList.remove('show');
                theaterMask.style.opacity = '0';
            }, 300);
        }

        
        //  route for media recorder
        
        let mediaRecorder;
        let recordedChunks = [];
        let videoURL = null;

        function startVideoRecording() {
            recordedChunks = [];
            const stream = canvas.captureStream(60);
            const options = { mimeType: 'video/webm;codecs=vp9,opus', videoBitsPerSecond: 40000000 };
            if (!MediaRecorder.isTypeSupported(options.mimeType)) {
                options.mimeType = 'video/webm;codecs=vp8';
            }
            mediaRecorder = new MediaRecorder(stream, options);
            mediaRecorder.ondataavailable = (e) => { if (e.data && e.data.size > 0) recordedChunks.push(e.data); };
            mediaRecorder.onstop = () => {
                const blob = new Blob(recordedChunks, { type: 'video/webm' });
                videoURL = URL.createObjectURL(blob);
                showDownloadButton();
            };
            mediaRecorder.start();
            recordingUI.style.display = 'flex';
            recordingText.innerText = "Recording for 30 sec";
            
            let secondsPassed = 0;
            const recordTimer = setInterval(() => {
                secondsPassed++;
                if (secondsPassed === 10) recordingText.innerText = "20 sec left...";
                else if (secondsPassed === 20) recordingText.innerText = "10 sec left...";
                else if (secondsPassed >= 30) {
                    clearInterval(recordTimer);
                    mediaRecorder.stop();
                    recordingUI.style.display = 'none';
                }
            }, 1000);
        }

        function showDownloadButton() {
            optionsContainer.innerHTML = `
                <div class="btn-option btn-download" onclick="handleDownloadAction()">💾 Download your vibe</div>
                <div class="btn-option btn-next-time" onclick="handleCloseAction()">maybe next time</div>
            `;
            optionsContainer.style.display = "flex";
            dialogText.innerText = "Your personalized zen video is ready!";
            dialogBox.classList.add('show');
        }

        function handleDownloadAction() {
            if (videoURL) {
                const a = document.createElement('a');
                a.href = videoURL;
                a.download = `zen-mood-gift-${selectedType}.webm`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
            }
            closeFinalDialog();
        }

        function handleCloseAction() { closeFinalDialog(); }
        function closeFinalDialog() {
            dialogBox.classList.remove('show');
            setTimeout(() => { optionsContainer.style.display = "none"; }, 1500);
        }

        //  啟動網頁故事流
        startFlow();
    </script>
</body>
</html>
