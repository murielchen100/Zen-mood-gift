<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zen Mood Gift - Personalized Interactive Experience</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }
        body, html { width: 100%; height: 100%; overflow: hidden; background-color: #e0e0e0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        #webgl-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        #silver-mirror-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 2; background: transparent; transition: opacity 2.5s cubic-bezier(0.4, 0, 0.2, 1); pointer-events: none; }
        #theater-mask { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 3; background-color: rgba(0, 0, 0, 0.65); opacity: 0; transition: opacity 1.5s ease; pointer-events: none; }
        #ui-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 4; display: flex; justify-content: center; align-items: center; pointer-events: none; }
        .cloud-box { position: absolute; background: rgba(255, 255, 255, 0.12); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.2); padding: 2.5rem 3.5rem; border-radius: 24px; color: #333; text-align: center; box-shadow: 0 20px 40px rgba(0,0,0,0.1); pointer-events: auto; opacity: 0; transform: translateY(20px) scale(0.95); transition: opacity 1.5s ease, transform 1.5s ease, color 1.5s ease; animation: floatingBump 6s ease-in-out infinite alternate; }
        .cloud-box.dark-mode { color: #fff; background: rgba(0, 0, 0, 0.2); border-color: rgba(255, 255, 255, 0.15); box-shadow: 0 20px 40px rgba(0,0,0,0.4); }
        @keyframes floatingBump { 0% { transform: translateY(0px) rotate(0deg); } 50% { transform: translateY(-10px) rotate(0.5deg) scale(1.01); } 100% { transform: translateY(5px) rotate(-0.5deg); } }
        .cloud-box.show { opacity: 1; transform: translateY(0) scale(1); }
        .cloud-box.fade-fast { transition: opacity 0.3s ease, transform 0.3s ease !important; opacity: 0 !important; transform: scale(0.9) !important; }
        h2 { font-size: 1.8rem; margin-bottom: 1.5rem; letter-spacing: 1px; font-weight: 400; }
        .options-list { display: flex; flex-direction: column; gap: 12px; min-width: 280px; }
        .btn-option { background: rgba(0, 0, 0, 0.05); border: 1px solid rgba(0, 0, 0, 0.15); color: #333; padding: 14px 20px; border-radius: 14px; font-size: 1rem; cursor: pointer; transition: all 0.25s ease; text-align: center; }
        .cloud-box.dark-mode .btn-option { background: rgba(255, 255, 255, 0.15); border-color: rgba(255, 255, 255, 0.25); color: #fff; }
        .btn-option:hover { background: rgba(0, 0, 0, 0.1); border-color: #333; transform: translateY(-2px); }
        .cloud-box.dark-mode .btn-option:hover { background: rgba(255, 255, 255, 0.3); border-color: #fff; }
    </style>
</head>
<body>

    <canvas id="webgl-canvas"></canvas>
    <div id="silver-mirror-overlay"></div>
    <div id="theater-mask"></div>

    <div id="ui-container">
        <div id="dialog-box" class="cloud-box">
            <h2 id="dialog-text">Hello there ...</h2>
            <div id="options-container" class="options-list" style="display: none;"></div>
        </div>
    </div>

    <script>
        const vertexShaderCode = `
            varying vec2 vUv;
            void main() { vUv = uv; gl_Position = vec4(position, 1.0); }
        `;

        const paletteSharedGLSL = `
            uniform vec2 iResolution;
            uniform float iTime;
            uniform float u_wave_a;
            uniform float u_wave_b;
            uniform vec3 u_palette_bias;
            uniform float u_silver_mode; // 0.0 = 時間凍結在 0 秒, 1.0 = 圖騰解鎖播放
            varying vec2 vUv;

            vec3 palette( float t, vec3 bias ){ 
                vec3 a = vec3(0.5, 0.5, 0.5);
                vec3 b = vec3(0.5, 0.5, 0.5);
                vec3 c = vec3(1.0, 1.0, 1.0);
                vec3 d = vec3(0.0, 0.1, 0.2) + bias; 
                return a + b * cos( 6.283185 * (c * t + d) );
            }
        `;

        // 1. 🌸 花朵片元著色器（5 朵花對稱核心邏輯，受控於 u_silver_mode 時間軸）
        const flowerFragmentCode = paletteSharedGLSL + `
            void main() {
                vec2 uv_center = (vUv * 2.0 - 1.0);
                uv_center.x *= iResolution.x / iResolution.y;
                vec2 uv_bg = vUv;

                // 🛠️ 利用 u_silver_mode 精準控管播放時間步進（0 = 凍結，1 = 正常跑時間）
                float controlledTime = iTime * u_silver_mode;

                float bg_t = uv_bg.x * 0.1 + uv_bg.y * 0.1 + controlledTime * 0.2;
                vec3 backgroundColor = palette(bg_t, vec3(0.0));

                vec3 rippleLayerColorSum = vec3(0.0);
                float total_mix_weight = 0.0;
                float totalLoop = 40.0; 

                for(int i = 0; i < 5; i++) {
                    float timeInterval = 3.0;
                    float timeOffset = float(i) * timeInterval + (float(i) * (float(i) - 1.0)) * 0.5;
                    
                    float rippleTime = mod(controlledTime - timeOffset, totalLoop);
                    if (rippleTime < 0.0) rippleTime += totalLoop;
                    
                    vec2 startCorner; float stageTime; 
                    if (rippleTime < 20.0) {
                        startCorner = vec2(1.5, 0.7);
                        stageTime = rippleTime; 
                    } else {
                        startCorner = vec2(-1.5, 0.7);
                        stageTime = rippleTime - 20.0; 
                    }
                    
                    float speedMultiplier = 0.8 + float(i) * 0.01;
                    float progress = stageTime * speedMultiplier; 
                    
                    vec2 posOffset = vec2(float(i) * 0.03 * sign(startCorner.x), float(i) * 0.015); 
                    vec2 shiftedStart = startCorner + posOffset;
                    vec3 colorBias = vec3(float(i) * 0.15, float(i) * 0.08, float(i) * 0.05);
                    vec2 targetCorner = -shiftedStart;
                    
                    float moveProgress = smoothstep(0.0, 12.0, stageTime);
                    vec2 currentCenter = mix(shiftedStart, targetCorner, moveProgress);
                    
                    float centerDist = length(currentCenter);
                    float instanceSize = 1.0 - float(i) * 0.1; 
                    float flowerScale = instanceSize * mix(1.0, 0.03, smoothstep(0.0, 1.5, centerDist));
                    
                    vec2 toCorner = uv_center - currentCenter;
                    float r = length(toCorner); float angle = atan(toCorner.y, toCorner.x); 
                    
                    float theta5 = angle * 2.5;
                    float flower_base = abs(sin(theta5)); float notch = 1.0 - abs(cos(theta5));
                    float sakuraShape = flower_base * 0.7 + notch * 0.25;
                    float base_d = (r / flowerScale) / (0.3 + 0.5 * sakuraShape);
                    
                    float theta = sin(base_d * 0.5 - progress * 1.5);
                    float alpha = sin(base_d * 1.5 - progress * 3.5);
                    
                    float layer_glow = (0.2 / (abs(theta) + 0.2)) + (0.06 / (abs(alpha) + 0.06));
                    layer_glow *= smoothstep(0.0, 1.5, stageTime) * (1.0 - smoothstep(12.0, 17.0, stageTime)) * exp(-base_d * 0.2);
                    
                    rippleLayerColorSum += palette(controlledTime * 0.08 + float(i) * 0.25, colorBias) * layer_glow;
                    total_mix_weight += layer_glow;
                }

                vec3 finalGraphicColor = mix(backgroundColor, rippleLayerColorSum / (total_mix_weight + 0.001), 1.0 - exp(-total_mix_weight * 1.3));
                gl_FragColor = vec4(mix(vec3(0.92, 0.93, 0.95), finalGraphicColor, step(0.01, u_silver_mode)), 1.0);
            }
        `;

        // 2. 🌿 樹葉片元著色器
        const leafFragmentCode = paletteSharedGLSL + `
            const float BASE_MOVE_DURATION  = 12.0;  
            const float BASE_VEIN_SPEED_A   = 0.3;   
            const float BASE_VEIN_SPEED_B   = 0.5;   
            const float BASE_ELLIP_SPEED_A  = 0.8;   
            const float BASE_ELLIP_SPEED_B  = 2.0;   

            void main() {
                vec2 uv_center = (vUv * 2.0 - 1.0); uv_center.x *= iResolution.x / iResolution.y;
                float controlledTime = iTime * u_silver_mode;

                vec3 backgroundColor = palette(vUv.x * 0.1 + vUv.y * 0.1 + controlledTime * 0.2, vec3(0.0));
                vec3 rippleLayerColorSum = vec3(0.0); float total_mix_weight = 0.0; float totalLoop = 50.0; 
                
                float mod_vein_speed_a  = BASE_VEIN_SPEED_A  * (u_wave_a / 6.0); float mod_vein_speed_b  = BASE_VEIN_SPEED_B  * (u_wave_b / 10.0);
                float mod_ellip_speed_a = BASE_ELLIP_SPEED_A * (u_wave_a / 6.0) * 0.25; float mod_ellip_speed_b = BASE_ELLIP_SPEED_B * (u_wave_b / 10.0) * 0.25;
                float angle_radians = atan(5.0 / 9.0); float ext_cos = cos(angle_radians); float ext_sin = sin(angle_radians);

                for(int i = 0; i < 4; i++) {
                    float timeOffset = float(i) * 3.0 + (float(i) * (float(i) - 1.0)) * 0.5; float rippleTime = mod(controlledTime - timeOffset, totalLoop); if (rippleTime < 0.0) rippleTime += totalLoop;
                    vec2 startCorner, center1, center2; float stageTime; 
                    if (rippleTime < 25.0) { startCorner = vec2(1.5, 0.7); center1 = vec2(1.5, -1.3); center2 = vec2(-1.5, 1.3); stageTime = rippleTime; }
                    else { startCorner = vec2(-1.5, 0.7); center1 = vec2(-1.5, -1.3); center2 = vec2(1.5, 1.3); stageTime = rippleTime - 25.0; }
                    
                    vec2 currentCenter = mix(startCorner, -startCorner, smoothstep(0.0, BASE_MOVE_DURATION * (6.0 / u_wave_a), stageTime));
                    float leafScale = (1.0 - float(i) * 0.2) * sin(clamp(stageTime / 14.0, 0.0, 1.0) * 3.14159);
                    vec2 toCorner = uv_center - currentCenter; float moveAngle = atan(-startCorner.y - startCorner.y, -startCorner.x - startCorner.x);
                    vec2 leaf_uv = vec2(toCorner.x * cos(moveAngle) + toCorner.y * sin(moveAngle), -toCorner.x * sin(moveAngle) + toCorner.y * cos(moveAngle));
                    leaf_uv.y += sin(leaf_uv.x * 1.2) * 0.12 * leafScale; float v_arc = (leaf_uv.x - sqrt(abs(leaf_uv.y)) * 0.65) / leafScale;
                    
                    float leaf_glow = (0.6 / (abs(sin(v_arc * 1.0 - stageTime * mod_vein_speed_a)) + 0.4) * 0.3 + 0.25 / (abs(sin(v_arc * 2.5 - stageTime * mod_vein_speed_b)) + 0.15) * 0.4) + (0.012 / (abs(leaf_uv.y / leafScale) + 0.012)) * smoothstep(1.0, 0.0, leaf_uv.x / leafScale);
                    float current_sin = (rippleTime < 25.0) ? ext_sin : -ext_sin; float ellipse_glow = 0.0; vec2 centers[2]; centers[0] = center1; centers[1] = center2;
                    for(int j = 0; j < 2; j++) {
                        vec2 toC = uv_center - centers[j]; vec2 rot = vec2(toC.x * ext_cos + toC.y * current_sin, -toC.x * current_sin + toC.y * ext_cos); float d = sqrt(rot.x * rot.x * 30.0 + rot.y * rot.y * 40.0) * 0.08;
                        ellipse_glow += (pow(0.03 / (abs(sin(d * 0.8 - stageTime * mod_ellip_speed_a)) + 0.03), 2.0) + pow(0.015 / (abs(sin(d * 2.5 - stageTime * mod_ellip_speed_b)) + 0.015), 2.0)) * exp(-d * 0.5) * 1.225;
                    }
                    rippleLayerColorSum += (palette(controlledTime * 0.08 + float(i) * 0.25, vec3(float(i)*0.05)) * leaf_glow + palette(controlledTime * 0.08 + float(i) * 0.25 + 0.5, vec3(float(i)*0.05)) * ellipse_glow) * time_env * global_env;
                    total_mix_weight += (leaf_glow + ellipse_glow) * time_env * global_env;
                }
                vec3 finalGraphicColor = mix(backgroundColor, rippleLayerColorSum / (total_mix_weight + 0.001), 1.0 - exp(-total_mix_weight * 1.2));
                gl_FragColor = vec4(mix(vec3(0.92, 0.93, 0.95), finalGraphicColor, step(0.01, u_silver_mode)), 1.0);
            }
        `;

        // 3. 🌊 海浪片元著色器
        const waveFragmentCode = paletteSharedGLSL + `
            const float BASE_MOVE_DURATION = 12.0; const float BASE_SPEED_TWIST = 0.5; const float BASE_SPEED_WAVE1 = 2.0; const float BASE_SPEED_WAVE2 = 3.0; 
            void main() {
                vec2 uv_center = (vUv * 2.0 - 1.0); uv_center.x *= iResolution.x / iResolution.y;
                float controlledTime = iTime * u_silver_mode;
                vec3 backgroundColor = palette(vUv.x * 0.1 + vUv.y * 0.1 + controlledTime * 0.2, vec3(0.0));
                vec3 rippleLayerColorSum = vec3(0.0); float total_mix_weight = 0.0; float totalLoop = 50.0; 
                float mod_speed_twist = BASE_SPEED_TWIST * (u_wave_a / 20.0); float mod_speed_wave1 = BASE_SPEED_WAVE1 * (u_wave_a / 20.0); float mod_speed_wave2 = BASE_SPEED_WAVE2 * (u_wave_b / 40.0);
                for(int i = 0; i < 2; i++) {
                    float timeInterval = 8.0; float timeOffset = float(i) * timeInterval + (float(i) * (float(i) - 1.0)) * 0.5; float rippleTime = mod(controlledTime - timeOffset, totalLoop); if (rippleTime < 0.0) rippleTime += totalLoop;
                    vec2 startCorner; float stageTime; if (rippleTime < 25.0) { startCorner = vec2(-1.5, -0.7); stageTime = rippleTime; } else { startCorner = vec2(1.5, -0.7); stageTime = rippleTime - 25.0; }
                    vec2 currentCenter = mix(startCorner + vec2(float(i) * 0.05 * sign(startCorner.x), -float(i) * 0.03), -(startCorner + vec2(float(i) * 0.05 * sign(startCorner.x), -float(i) * 0.03)), smoothstep(0.0, BASE_MOVE_DURATION * (20.0 / u_wave_a), stageTime));
                    vec2 toCenter = uv_center - currentCenter; float r = length(toCenter); float angle = atan(toCenter.y, toCenter.x);
                    float twistedAngle = angle + (1.5 / (r + 0.1)) * (-sign(startCorner.x)) - stageTime * mod_speed_twist;
                    float base_d = (r / ((1.0 - float(i) * 0.15) * mix(1.0, 0.1, smoothstep(0.0, 1.8, length(currentCenter))))) / (0.4 + 0.4 * pow(abs(sin(twistedAngle * 3.0)), 0.5) * sign(sin(twistedAngle * 3.0)));
                    float wave_line1 = 0.1 / (abs(sin(base_d * 1.0 - stageTime * mod_speed_wave1)) + 0.1); float wave_line2 = 0.05 / (abs(cos(base_d * 2.25 + twistedAngle * 2.0 - stageTime * mod_speed_wave2)) + 0.05);
                    rippleLayerColorSum += palette(controlledTime * 0.05 + float(i) * 0.3, vec3(float(i) * 0.12, float(i) * 0.06, float(i) * 0.15)) * ((wave_line1 * 1.2 + wave_line2 * wave_line1 * 0.8) * smoothstep(0.0, 1.5, stageTime) * (1.0 - smoothstep(12.0, 17.0, stageTime)) * exp(-base_d * 0.15));
                    total_mix_weight += (wave_line1 * 1.2 + wave_line2 * wave_line1 * 0.8) * smoothstep(0.0, 1.5, stageTime) * (1.0 - smoothstep(12.0, 17.0, stageTime)) * exp(-base_d * 0.15);
                }
                vec3 finalGraphicColor = mix(backgroundColor, rippleLayerColorSum / (total_mix_weight + 0.001), 1.0 - exp(-total_mix_weight * 1.5));
                gl_FragColor = vec4(mix(vec3(0.92, 0.93, 0.95), finalGraphicColor, step(0.01, u_silver_mode)), 1.0);
            }
        `;
    </script>

    <script>
        // --- Three.js 引擎初始化 ---
        const canvas = document.getElementById('webgl-canvas');
        const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        
        const scene = new THREE.Scene();
        const camera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);
        const geometry = new THREE.PlaneGeometry(2, 2);

        const shaderUniforms = {
            iResolution: { value: new THREE.Vector2(window.innerWidth, window.innerHeight) },
            iTime: { value: 0 },
            u_wave_a: { value: 6.0 },   
            u_wave_b: { value: 10.0 },  
            u_palette_bias: { value: new THREE.Vector3(0.0, 0.1, 0.2) },
            u_silver_mode: { value: 0.0 } 
        };

        let shaderMaterial = new THREE.ShaderMaterial({
            vertexShader: vertexShaderCode,
            fragmentShader: flowerFragmentCode,
            uniforms: shaderUniforms,
            depthWrite: false, depthTest: false
        });
        const mesh = new THREE.Mesh(geometry, shaderMaterial);
        scene.add(mesh);

        window.addEventListener('resize', () => {
            renderer.setSize(window.innerWidth, window.innerHeight);
            shaderUniforms.iResolution.value.set(window.innerWidth, window.innerHeight);
        });

        const clock = new THREE.Clock();
        function animate() {
            requestAnimationFrame(animate);
            shaderUniforms.iTime.value = clock.getElapsedTime();
            renderer.render(scene, camera);
        }
        animate();

        // --- UI 控制流程 (精準對齊 Miro 流程圖文字框架) ---
        const dialogBox = document.getElementById('dialog-box');
        const dialogText = document.getElementById('dialog-text');
        const optionsContainer = document.getElementById('options-container');
        const silverOverlay = document.getElementById('silver-mirror-overlay');
        const theaterMask = document.getElementById('theater-mask');

        const delay = ms => new Promise(res => setTimeout(res, ms));

        let selectedWaveA = 6.0;
        let selectedWaveB = 10.0;

        async function updateDialogText(text) {
            dialogBox.classList.remove('show');
            await delay(1500);
            dialogText.innerText = text;
            dialogBox.classList.add('show');
        }

        // Output 1 -> 2 -> 3
        async function startFlow() {
            await delay(500);
            dialogBox.classList.add('show');
            await delay(2000); 
            await updateDialogText("How's your day?");
            await delay(2000); 
            await updateDialogText("Just take a breathe, and tell us ...");
            await delay(2000); 
            showOption1();
        }

        // Option 1 (精準對照 Miro 提問與按鈕字樣)
        async function showOption1() {
            dialogBox.classList.remove('show');
            await delay(1500);
            dialogText.innerText = "How do you feel right now?";
            optionsContainer.innerHTML = `
                <div class="btn-option" onclick="handleSelectOption1(10.0, 15.0)">1. I'm good 😊</div>
                <div class="btn-option" onclick="handleSelectOption1(6.0, 10.0)">2. Just a bit tired ...</div>
                <div class="btn-option" onclick="handleSelectOption1(20.0, 40.0)">3. Full of energy !!</div>
            `;
            optionsContainer.style.display = "flex";
            dialogBox.classList.add('show');
        }

        function handleSelectOption1(waveA, waveB) {
            dialogBox.classList.add('fade-fast');
            selectedWaveA = waveA;
            selectedWaveB = waveB;

            setTimeout(async () => {
                optionsContainer.style.display = "none";
                dialogBox.classList.remove('fade-fast');
                
                // Output 4
                dialogText.innerText = "What are you planning to do next ?";
                dialogBox.classList.add('show');
                await delay(2000); 
                showOption2();
            }, 300);
        }

        // Option 2 (精準對照 Miro 提問與按鈕字樣)
        async function showOption2() {
            dialogBox.classList.remove('show');
            await delay(1500);
            dialogText.innerText = "Choose a vibe for your next step:";
            optionsContainer.innerHTML = `
                <div class="btn-option" onclick="selectOption2(0.0, 0.1, 0.2)">1. Relax on my couch</div>
                <div class="btn-option" onclick="selectOption2(0.3, 0.0, 0.4)">2. Having fun</div>
                <div class="btn-option" onclick="selectOption2(0.5, 0.5, 0.0)">3. Party !</div>
            `;
            optionsContainer.style.display = "flex";
            dialogBox.classList.add('show');
        }

        function selectOption2(r_bias, g_bias, b_bias) {
            dialogBox.classList.add('fade-fast');
            shaderUniforms.u_palette_bias.value.set(r_bias, g_bias, b_bias);

            setTimeout(() => {
                optionsContainer.style.display = "none";
                dialogBox.classList.remove('fade-fast');
                showOption3();
            }, 300);
        }

        // Option 3
        async function showOption3() {
            dialogText.innerText = "Pick a symbol that guides you:";
            optionsContainer.innerHTML = `
                <div class="btn-option" onclick="selectOption3('flower')">🌸 Sakura Flower</div>
                <div class="btn-option" onclick="selectOption3('leaf')">🌿 Zen Leaf</div>
                <div class="btn-option" onclick="selectOption3('wave')">🌊 Great Wave</div>
            `;
            optionsContainer.style.display = "flex";
            dialogBox.classList.add('show');
        }

        function selectOption3(type) {
            dialogBox.classList.add('fade-fast');

            // 1. 先在此處指派即將編譯的圖騰類型
            let nextShaderCode = flowerFragmentCode;
            if(type === 'flower') nextShaderCode = flowerFragmentCode;
            else if(type === 'leaf') nextShaderCode = leafFragmentCode;
            else if(type === 'wave') nextShaderCode = waveFragmentCode;

            setTimeout(async () => {
                optionsContainer.style.display = "none";
                dialogBox.classList.remove('fade-fast');
                
                // 🛠️ 2. 【調整點 1】："A moment before the gift ..." 出現的這一秒（第 0 秒），黑幕遮罩立刻升起，Shader 圖騰在此刻悄悄替換，但 u_silver_mode 為 0，圖騰完全卡在第 0 秒靜止，絕不搶先偷跑！
                dialogText.innerText = "A moment before the gift ...";
                theaterMask.style.opacity = '1';
                dialogBox.classList.add('dark-mode');
                dialogBox.classList.add('show');
                
                mesh.material.fragmentShader = nextShaderCode;
                shaderUniforms.u_wave_a.value = selectedWaveA;
                shaderUniforms.u_wave_b.value = selectedWaveB;
                shaderUniforms.u_silver_mode.value = 0.0; // 確保凍結不穿幫
                mesh.material.needsUpdate = true;

                // 🛠️ 3. 【調整點 2】：黑幕與文字完美持滿 3 秒鐘過渡
                await delay(3000); 
                
                // 🛠️ 3秒黑幕完結的這一瞬間，解鎖時間軸，幾何圖騰開始在後台從第0秒正式播放！
                shaderUniforms.u_silver_mode.value = 1.0; 

                // 4. 切換為 Output 6 最終文字
                await updateDialogText("And here you are !");
                await delay(2000); // 文字停留 2 秒
                
                // 🛠️ 5. 【調整點 3】：等 "And here you are !" 完結、文字對話框完全消失的最後一刻，黑色半透明劇院遮罩才優雅退場消失
                dialogBox.classList.remove('show');
                await delay(1000); // 給文字框平滑收尾隱藏的緩衝時間
                theaterMask.style.opacity = '0'; // 半透明黑色遮罩在此刻正式退去，完美展示圖騰成果！
            }, 300);
        }

        startFlow();
    </script>
</body>
</html>
