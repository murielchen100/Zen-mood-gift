<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Brainwave Shader System</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
        }
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }
        /* Three.js Canvas 全螢幕背景 */
        #webgl-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }
        /* UI 互動層（蓋在 Canvas 上方） */
        #ui-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            display: flex;
            justify-content: center;
            align-items: center;
            pointer-events: none; /* 讓滑鼠事件預設穿透 */
        }
        /* ☁️ 如雲朵般漂浮、碰撞律動的對話框樣式 */
        .cloud-box {
            position: absolute;
            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 2.5rem 3.5rem;
            border-radius: 24px;
            color: #fff;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            pointer-events: auto; /* 開啟互動 */
            opacity: 0;
            transform: translateY(20px) scale(0.95);
            transition: opacity 1.5s ease, transform 1.5s ease;
            animation: floatingBump 6s ease-in-out infinite alternate;
        }
        /* 雲朵漂浮動態 */
        @keyframes floatingBump {
            0% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-10px) rotate(0.5deg) scale(1.01); }
            100% { transform: translateY(5px) rotate(-0.5deg); }
        }
        /* 控制淡入淡出的 Class */
        .cloud-box.show {
            opacity: 1;
            transform: translateY(0) scale(1);
        }
        .cloud-box.fade-fast {
            transition: opacity 0.3s ease, transform 0.3s ease !important;
            opacity: 0 !important;
            transform: scale(0.9) !important;
        }
        h2 {
            font-size: 1.8rem;
            margin-bottom: 1.5rem;
            letter-spacing: 1px;
            font-weight: 400;
        }
        /* 選項按鈕樣式 */
        .options-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            min-width: 280px;
        }
        .btn-option {
            background: rgba(255, 255, 255, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.25);
            padding: 14px 20px;
            border-radius: 14px;
            color: #fff;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.25s ease;
            text-align: center;
        }
        .btn-option:hover {
            background: rgba(255, 255, 255, 0.3);
            border-color: #fff;
            transform: translateY(-2px);
        }
        .btn-option:active {
            transform: translateY(1px);
        }
    </style>
</head>
<body>

    <canvas id="webgl-canvas"></canvas>
    <div id="ui-container">
        <div id="dialog-box" class="cloud-box">
            <h2 id="dialog-text">Hello there ...</h2>
            <div id="options-container" class="options-list" style="display: none;"></div>
        </div>
    </div>

    <script>
        // 常用的 Palette 頂部 Uniform 宣告，避免程式碼重複
        const shaderUniformsHeader = `
            uniform vec2 iResolution;
            uniform float iTime;
            uniform float u_freq_multiplier;
            uniform float u_hz6_speed;
            uniform float u_hz10_speed;
            uniform vec3 u_palette_bias;

            vec3 palette( float t, vec3 bias ){ 
                vec3 a = vec3(0.5, 0.5, 0.5);
                vec3 b = vec3(0.5, 0.5, 0.5);
                vec3 c = vec3(1.0, 1.0, 1.0);
                vec3 d = u_palette_bias + bias; 
                return a + b * cos( 6.283185 * (c * t + d) );
            }
        `;

        // 🌸 模式 1：櫻花 Shader
        const flowerShader = shaderUniformsHeader + `
            void main() {
                vec2 uv_center = (gl_FragCoord.xy * 2.0 - iResolution.xy) / iResolution.y;
                vec2 uv_bg = gl_FragCoord.xy / iResolution.xy;
                float bg_t = uv_bg.x * 0.1 + uv_bg.y * 0.1 + iTime * (0.2 * u_freq_multiplier);
                vec3 backgroundColor = palette(bg_t, vec3(0.0));
                vec3 rippleLayerColorSum = vec3(0.0);
                float total_mix_weight = 0.0;
                float totalLoop = 50.0; 

                for(int i = 0; i < 4; i++) {
                    float timeInterval = 3.0;
                    float timeOffset = float(i) * timeInterval + (float(i) * (float(i) - 1.0)) * 0.5;
                    float rippleTime = mod(iTime - timeOffset, totalLoop);
                    if (rippleTime < 0.0) rippleTime += totalLoop;
                    vec2 startCorner; float stageTime; 
                    if (rippleTime < 25.0) { startCorner = vec2(1.5, 0.7); stageTime = rippleTime; } 
                    else { startCorner = vec2(-1.5, 0.7); stageTime = rippleTime - 25.0; }
                    
                    float speedMultiplier = (0.8 + float(i) * 0.01) * u_freq_multiplier;
                    float progress = stageTime * speedMultiplier; 
                    vec2 posOffset = vec2(float(i) * 0.03 * sign(startCorner.x), float(i) * 0.015); 
                    vec2 shiftedStart = startCorner + posOffset;
                    vec3 colorBias = vec3(float(i) * 0.15, float(i) * 0.08, float(i) * 0.05);
                    vec2 targetCorner = -shiftedStart;
                    float moveProgress = smoothstep(0.0, 12.0, stageTime * u_freq_multiplier);
                    vec2 currentCenter = mix(shiftedStart, targetCorner, moveProgress);
                    
                    float centerDist = length(currentCenter);
                    float instanceSize = 1.0 - float(i) * 0.2; 
                    float flowerScale = instanceSize * mix(1.0, 0.03, smoothstep(0.0, 1.5, centerDist));
                    vec2 toCorner = uv_center - currentCenter;
                    float r = length(toCorner); float angle = atan(toCorner.y, toCorner.x); 
                    
                    float theta5 = angle * 2.5;
                    float flower_base = abs(sin(theta5)); 
                    float notch = 1.0 - abs(cos(theta5));
                    float sakuraShape = flower_base * 0.7 + notch * 0.25;
                    float base_d = (r / flowerScale) / (0.3 + 0.5 * sakuraShape);
                    
                    float theta = sin(base_d * 0.5 - progress * 1.5);
                    float alpha = sin(base_d * 1.5 - progress * 3.5);
                    float theta_glow = 0.2 / (abs(theta) + 0.2);   
                    float alpha_glow = 0.06 / (abs(alpha) + 0.06); 
                    float layer_glow = theta_glow + alpha_glow;
                    
                    float fadeIn = smoothstep(0.0, 1.5, stageTime * u_freq_multiplier);
                    float fadeOut = 1.0 - smoothstep(12.0, 17.0, stageTime * u_freq_multiplier);
                    float spaceFade = exp(-base_d * 0.2); 
                    layer_glow *= fadeIn * fadeOut * spaceFade;
                    
                    vec3 thisCornerColor = palette(iTime * (0.08 * u_freq_multiplier) + float(i) * 0.25, colorBias);
                    rippleLayerColorSum += thisCornerColor * layer_glow;
                    total_mix_weight += layer_glow;
                }
                vec3 finalRippleColor = rippleLayerColorSum / (total_mix_weight + 0.001);
                gl_FragColor = vec4(mix(backgroundColor, finalRippleColor, 1.0 - exp(-total_mix_weight * 1.3)), 1.0);
            }
        `;

        // 🌿 模式 2：樹葉 Shader
        const leafShader = shaderUniformsHeader + `
            void main() {
                float waveFreq = 1.2; float waveAmp = 0.12; float arcCurv = 0.65; float veinThick = 0.012;
                float ellipScale = 0.08; float ellipRatioX = 30.0; float ellipRatioY = 40.0; 
                float ellipThick1 = 0.03; float ellipThick2 = 0.015; float sharpen = 3.5; float colorDelay = 0.5;   
                
                vec2 uv_center = (gl_FragCoord.xy * 2.0 - iResolution.xy) / iResolution.y;
                vec2 uv_bg = gl_FragCoord.xy / iResolution.xy;
                vec3 backgroundColor = palette(uv_bg.x * 0.1 + uv_bg.y * 0.1 + iTime * (0.2 * u_freq_multiplier), vec3(0.0));
                vec3 rippleLayerColorSum = vec3(0.0);
                float total_mix_weight = 0.0; float totalLoop = 50.0; 
                
                float hz6 = iTime * u_hz6_speed; float hz10 = iTime * u_hz10_speed;
                float angle_radians = atan(5.0 / 9.0); float ext_cos = cos(angle_radians); float ext_sin = sin(angle_radians);

                for(int i = 0; i < 4; i++) {
                    float timeOffset = float(i) * 3.0 + (float(i) * (float(i) - 1.0)) * 0.5;
                    float rippleTime = mod(iTime - timeOffset, totalLoop);
                    if (rippleTime < 0.0) rippleTime += totalLoop;
                    vec2 startCorner, center1, center2; float stageTime; 
                    if (rippleTime < 25.0) { startCorner = vec2(1.5, 0.7); center1 = vec2(1.5, -1.3); center2 = vec2(-1.5, 1.3); stageTime = rippleTime; } 
                    else { startCorner = vec2(-1.5, 0.7); center1 = vec2(-1.5, -1.3); center2 = vec2(1.5, 1.3); stageTime = rippleTime - 25.0; }
                    
                    vec2 targetCorner = -startCorner;
                    vec2 currentCenter = mix(startCorner, targetCorner, smoothstep(0.0, 12.0, stageTime * u_freq_multiplier));
                    float leafScale = (1.0 - float(i) * 0.2) * sin(clamp((stageTime * u_freq_multiplier) / 14.0, 0.0, 1.0) * 3.14159);
                    vec2 toCorner = uv_center - currentCenter;
                    float moveAngle = atan(targetCorner.y - startCorner.y, targetCorner.x - startCorner.x);
                    vec2 leaf_uv = vec2(toCorner.x * cos(moveAngle) + toCorner.y * sin(moveAngle), -toCorner.x * sin(moveAngle) + toCorner.y * cos(moveAngle));
                    
                    leaf_uv.y += sin(leaf_uv.x * waveFreq) * waveAmp * leafScale;
                    float v_arc = (leaf_uv.x - sqrt(abs(leaf_uv.y)) * arcCurv) / leafScale;
                    float leaf_glow = (0.6 / (abs(sin(v_arc * 1.0 - hz6)) + 0.4) * 0.3 + 0.25 / (abs(sin(v_arc * 2.5 - hz10)) + 0.15) * 0.4);
                    leaf_glow += (veinThick / (abs(leaf_uv.y / leafScale) + veinThick)) * smoothstep(1.0, 0.0, leaf_uv.x / leafScale);
                    
                    float current_sin = (rippleTime < 25.0) ? ext_sin : -ext_sin; float ellipse_glow = 0.0;
                    vec2 centers[2]; centers[0] = center1; centers[1] = center2;
                    for(int j = 0; j < 2; j++) {
                        vec2 toC = uv_center - centers[j];
                        vec2 rot = vec2(toC.x * ext_cos + toC.y * current_sin, -toC.x * current_sin + toC.y * ext_cos);
                        float d = sqrt(rot.x * rot.x * ellipRatioX + rot.y * rot.y * ellipRatioY) * ellipScale;
                        float g1 = pow(ellipThick1 / (abs(sin(d * 0.8 - stageTime * (0.8 * u_freq_multiplier))) + ellipThick1), 2.0);
                        float g2 = pow(ellipThick2 / (abs(sin(d * 2.5 - stageTime * (2.0 * u_freq_multiplier))) + ellipThick2), 2.0);
                        ellipse_glow += (g1 + g2) * exp(-d * 0.5) * 0.35 * sharpen;
                    }
                    float global_env = smoothstep(1.8, 0.0, abs(uv_center.x * ext_sin - uv_center.y * ext_cos) * 0.4);
                    float time_env = smoothstep(0.0, 1.0, stageTime * u_freq_multiplier) * (1.0 - smoothstep(10.0, 14.0, stageTime * u_freq_multiplier));
                    vec3 bias = vec3(float(i)*0.05);
                    vec3 leafColor = palette(iTime * (0.08 * u_freq_multiplier) + float(i) * 0.25, bias);
                    vec3 ellipColor = palette(iTime * (0.08 * u_freq_multiplier) + float(i) * 0.25 + colorDelay, bias);
                    rippleLayerColorSum += (leafColor * leaf_glow + ellipColor * ellipse_glow) * time_env * global_env;
                    total_mix_weight += (leaf_glow + ellipse_glow) * time_env * global_env;
                }
                gl_FragColor = vec4(mix(backgroundColor, rippleLayerColorSum / (total_mix_weight + 0.001), 1.0 - exp(-total_mix_weight * 1.2)), 1.0);
            }
        `;

        // 🌊 模式 3：海浪 Shader
        const waveShader = shaderUniformsHeader + `
            void main() {
                vec2 uv_center = (gl_FragCoord.xy * 2.0 - iResolution.xy) / iResolution.y;
                vec2 uv_bg = gl_FragCoord.xy / iResolution.xy;
                float bg_t = uv_bg.x * 0.1 + uv_bg.y * 0.1 + iTime * (0.2 * u_freq_multiplier);
                vec3 backgroundColor = palette(bg_t, vec3(0.0));
                vec3 rippleLayerColorSum = vec3(0.0);
                float total_mix_weight = 0.0; float totalLoop = 50.0; 

                for(int i = 0; i < 2; i++) {
                    float timeInterval = 8.0;
                    float timeOffset = float(i) * timeInterval + (float(i) * (float(i) - 1.0)) * 0.5;
                    float rippleTime = mod(iTime - timeOffset, totalLoop);
                    if (rippleTime < 0.0) rippleTime += totalLoop;
                    vec2 startCorner; float stageTime; 
                    if (rippleTime < 25.0) { startCorner = vec2(-1.5, -0.7); stageTime = rippleTime; } 
                    else { startCorner = vec2(1.5, -0.7); stageTime = rippleTime - 25.0; }
                    
                    float speedMultiplier = (0.8 + float(i) * 0.01) * u_freq_multiplier;
                    float progress = stageTime * speedMultiplier; 
                    vec2 posOffset = vec2(float(i) * 0.05 * sign(startCorner.x), -float(i) * 0.03); 
                    vec2 shiftedStart = startCorner + posOffset;
                    vec3 colorBias = vec3(float(i) * 0.12, float(i) * 0.06, float(i) * 0.15); 
                    vec2 targetCorner = -shiftedStart;
                    vec2 currentCenter = mix(shiftedStart, targetCorner, smoothstep(0.0, 12.0, stageTime * u_freq_multiplier));
                    
                    float centerDist = length(currentCenter);
                    float instanceSize = 1.0 - float(i) * 0.15; 
                    float waveScale = instanceSize * mix(1.0, 0.1, smoothstep(0.0, 1.8, centerDist));
                    vec2 toCenter = uv_center - currentCenter;
                    float waveDirection = -sign(startCorner.x); 
                    
                    float r = length(toCenter); float angle = atan(toCenter.y, toCenter.x);
                    float twist = 1.5 / (r + 0.1); float twistedAngle = angle + twist * waveDirection - progress * 0.5;
                    float waveShape = sin(twistedAngle * 3.0); waveShape = pow(abs(waveShape), 0.5) * sign(waveShape); 
                    float base_d = (r / waveScale) / (0.4 + 0.4 * waveShape);
                    
                    float wave1 = sin(base_d * 1.0 - progress * 2.0);
                    float wave2 = cos(base_d * 2.25 + twistedAngle * 2.0 - progress * 3.0);
                    float wave_line1 = 0.1 / (abs(wave1) + 0.1); float wave_line2 = 0.05 / (abs(wave2) + 0.05);
                    float layer_glow = wave_line1 * 1.2 + wave_line2 * wave_line1 * 0.8;
                    
                    float fadeIn = smoothstep(0.0, 1.5, stageTime * u_freq_multiplier);
                    float fadeOut = 1.0 - smoothstep(12.0, 17.0, stageTime * u_freq_multiplier);
                    float spaceFade = exp(-base_d * 0.15); 
                    layer_glow *= fadeIn * fadeOut * spaceFade;
                    
                    vec3 thisCornerColor = palette(iTime * (0.05 * u_freq_multiplier) + float(i) * 0.3, colorBias);
                    rippleLayerColorSum += thisCornerColor * layer_glow;
                    total_mix_weight += layer_glow;
                }
                vec3 finalRippleColor = rippleLayerColorSum / (total_mix_weight + 0.001);
                gl_FragColor = vec4(mix(backgroundColor, finalRippleColor, 1.0 - exp(-total_mix_weight * 1.5)), 1.0);
            }
        `;
    </script>

    <script>
        // --- 1. Three.js 初始化環境 ---
        const canvas = document.getElementById('webgl-canvas');
        const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);

        const scene = new THREE.Scene();
        const camera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);

        // 初始化傳遞給 Shader 的智慧型常數系統 (Uniforms)
        const shaderUniforms = {
            iResolution: { value: new THREE.Vector2(window.innerWidth, window.innerHeight) },
            iTime: { value: 0 },
            u_freq_multiplier: { value: 1.0 },
            u_hz6_speed: { value: 0.3 },
            u_hz10_speed: { value: 0.5 },
            u_palette_bias: { value: new THREE.Vector3(0.0, 0.1, 0.2) } // 預設色盤 1
        };

        // 預設先編譯第一個 Shader（櫻花）作為起始背景
        const geometry = new THREE.PlaneGeometry(2, 2);
        let shaderMaterial = new THREE.ShaderMaterial({
            fragmentShader: flowerShader, // 預設
            uniforms: shaderUniforms,
            depthWrite: false,
            depthTest: false
        });
        const mesh = new THREE.Mesh(geometry, shaderMaterial);
        scene.add(mesh);

        // 監聽視窗縮放
        window.addEventListener('resize', () => {
            renderer.setSize(window.innerWidth, window.innerHeight);
            shaderUniforms.iResolution.value.set(window.innerWidth, window.innerHeight);
        });

        // 動態渲染循環
        const clock = new THREE.Clock();
        function animate() {
            requestAnimationFrame(animate);
            shaderUniforms.iTime.value = clock.getElapsedTime();
            renderer.render(scene, camera);
        }
        animate();


        // --- 2. 網頁流程與互動狀態機 (完全對應 Miro 圖表流程) ---
        const dialogBox = document.getElementById('dialog-box');
        const dialogText = document.getElementById('dialog-text');
        const optionsContainer = document.getElementById('options-container');

        // 延時輔助函式
        const delay = ms => new Promise(res => setTimeout(res, ms));

        // 封裝對話框切換動畫
        async function updateDialogText(text) {
            dialogBox.classList.remove('show');
            await delay(1500); // 等待淡出
            dialogText.innerText = text;
            dialogBox.classList.add('show');
        }

        // 核心流程控制
        async function startFlow() {
            // 一開始優雅浮現
            await delay(500);
            dialogBox.classList.add('show');

            // Output 1 -> 2秒後淡出
            await delay(2000);
            
            // Output 2
            await updateDialogText("How's your day?");
            await delay(2000);

            // Output 3
            await updateDialogText("Just take a breathe, and tell us ...");
            await delay(2000);

            // 顯示 Option 1 選擇題
            showOption1();
        }

        // 🛠️ 【Option 1】：選擇腦波頻率
        async function showOption1() {
            dialogBox.classList.remove('show');
            await delay(1500);
            dialogText.innerText = "How do you feel right now?";
            optionsContainer.innerHTML = `
                <div class="btn-option" onclick="selectOption1(1, 1.0, 0.3, 0.5)">1. I'm good 😊 (Alpha 10Hz + Beta 15Hz)</div>
                <div class="btn-option" onclick="selectOption1(2, 0.5, 0.1, 0.3)">2. Just a bit tired ... (Theta 6Hz + Alpha 10Hz)</div>
                <div class="btn-option" onclick="selectOption1(3, 1.8, 0.8, 1.5)">3. Full of energy !! (Beta 20Hz + Gama 40Hz)</div>
            `;
            optionsContainer.style.display = "flex";
            dialogBox.classList.add('show');
        }

        function selectOption1(index, multiplier, hz6, hz10) {
            // ✨【Miro 關鍵要求】：點選後立即消失 (Fade out right away)
            dialogBox.classList.add('fade-fast');
            
            // 立即動態調整 Shader 內部的波動頻率與流速！
            shaderUniforms.u_freq_multiplier.value = multiplier;
            shaderUniforms.u_hz6_speed.value = hz6;
            shaderUniforms.u_hz10_speed.value = hz10;

            setTimeout(async () => {
                optionsContainer.style.display = "none";
                dialogBox.classList.remove('fade-fast');
                
                // 進入 Output 4
                dialogText.innerText = "What are you planning to do next ?";
                dialogBox.classList.add('show');
                await delay(2000);
                
                // 進入 Option 2
                showOption2();
            }, 300);
        }

        // 🛠️ 【Option 2】：選擇色盤顏色
        async function showOption2() {
            dialogBox.classList.remove('show');
            await delay(1500);
            dialogText.innerText = "Choose an vibe for your next step:";
            optionsContainer.innerHTML = `
                <div class="btn-option" onclick="selectOption2(1, 0.0, 0.1, 0.2)">1. Relax on my couch (Palette 1)</div>
                <div class="btn-option" onclick="selectOption2(2, 0.3, 0.0, 0.4)">2. Having fun (Palette 2)</div>
                <div class="btn-option" onclick="selectOption2(3, 0.5, 0.5, 0.0)">3. Party ! (Palette 3)</div>
            `;
            optionsContainer.style.display = "flex";
            dialogBox.classList.add('show');
        }

        function selectOption2(index, r_bias, g_bias, b_bias) {
            dialogBox.classList.add('fade-fast');
            
            // 立即動態調整 Shader 內部的極光雷射色盤
            shaderUniforms.u_palette_bias.value.set(r_bias, g_bias, b_bias);

            setTimeout(() => {
                optionsContainer.style.display = "none";
                dialogBox.classList.remove('fade-fast');
                
                // 進入 Option 3
                showOption3();
            }, 300);
        }

        // 🛠️ 【Option 3】：選擇圖形 Shader 抽換
        async function showOption3() {
            dialogText.innerText = "Pick a symbol that guides you:";
            optionsContainer.innerHTML = `
                <div class="btn-option" onclick="selectOption3('flower')">🌸 Sakura Flower</div>
                <div class="btn-option" onclick="selectOption3('leaf')">🌿 Radiant Leaf</div>
                <div class="btn-option" onclick="selectOption3('wave')">🌊 Great Wave</div>
            `;
            optionsContainer.style.display = "flex";
            dialogBox.classList.add('show');
        }

        function selectOption3(type) {
            dialogBox.classList.add('fade-fast');

            // 根據選取的類型，利用 Three.js 即時重新編譯底層的 Shader 原始碼
            if (type === 'flower') {
                mesh.material.fragmentShader = flowerShader;
            } else if (type === 'leaf') {
                mesh.material.fragmentShader = leafShader;
            } else if (type === 'wave') {
                mesh.material.fragmentShader = waveShader;
            }
            mesh.material.needsUpdate = true; // 通知 WebGL 重新編譯

            setTimeout(async () => {
                optionsContainer.style.display = "none";
                dialogBox.classList.remove('fade-fast');
                
                // Output 5
                dialogText.innerText = "A moment before the gift ...";
                dialogBox.classList.add('show');
                await delay(3000); // Miro 要求 3 秒
                
                // Output 6
                await updateDialogText("And here you are !");
                await delay(2000);
                
                // 最終淡出對話框，只留下絕美的全螢幕個人化互動著色器畫布
                dialogBox.classList.remove('show');
            }, 300);
        }

        // 啟動整個系統流程
        startFlow();
    </script>
</body>
</html>
