<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zen Mood Gift - Personalized Interactive Experience</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }
        body, html { width: 100%; height: 100%; overflow: hidden; background-color: #e0e0e0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        #webgl-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        #silver-mirror-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 2; background: linear-gradient(135deg, #cfd9df 0%, #e2ebf0 100%); box-shadow: inset 0 0 100px rgba(255,255,255,0.6); transition: opacity 2.5s cubic-bezier(0.4, 0, 0.2, 1); pointer-events: none; overflow: hidden; }
        #silver-mirror-overlay::after { content: ''; position: absolute; top: -50%; left: -60%; width: 30%; height: 200%; background: linear-gradient(to right, rgba(255,255,255,0) 0%, rgba(255,255,255,0.9) 50%, rgba(255,255,255,0) 100%); transform: rotate(30deg); animation: silverShine 4s cubic-bezier(0.3, 0.1, 0.3, 1) infinite; }
        @keyframes silverShine { 0% { left: -60%; opacity: 0; } 10% { opacity: 1; } 40% { left: 140%; opacity: 1; } 50%, 100% { left: 140%; opacity: 0; } }
        #theater-mask { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 3; background-color: rgba(0, 0, 0, 0.65); opacity: 0; transition: opacity 1.5s ease; pointer-events: none; }
        #ui-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 4; display: flex; justify-content: center; align-items: center; pointer-events: none; }
        .cloud-box { position: absolute; background: rgba(255, 255, 255, 0.12); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.2); padding: 2.5rem 3.5rem; border-radius: 24px; color: #333; text-align: center; box-shadow: 0 20px 40px rgba(0,0,0,0.1); pointer-events: auto; opacity: 0; transform: translateY(20px) scale(0.95); transition: opacity 1.5s ease, transform 1.5s ease, color 1.5s ease; animation: floatingBump 6s ease-in-out infinite alternate; }
        .cloud-box.dark-mode { color: #fff; background: rgba(0, 0, 0, 0.2); border-color: rgba(255, 255, 255, 0.15); box-shadow: 0 20px 40px rgba(0,0,0,0.4); }
        @keyframes floatingBump { 0% { transform: translateY(0px) rotate(0deg); } 50% { transform: translateY(-10px) rotate(0.5deg) scale(1.01); } 100% { transform: translateY(5px) rotate(-0.5deg); } }
        .cloud-box.show { opacity: 1; transform: translateY(0) scale(1); }
        .cloud-box.fade-fast { transition: opacity 0.3s ease, transform 0.3s ease !important; opacity: 0 !important; transform: scale(0.9) !important; }
        h2 { font-size: 1.8rem; margin-bottom: 1.5rem; letter-spacing: 1px; font-weight: 400; }
        .options-list { display: flex; flex-direction: column; gap: 12px; min-width: 280px; }
        .btn-option { background: rgba(0, 0, 0, 0.05); border: 1px solid rgba(0, 0, 0, 0.15); color: #333; padding: 14px 20px; border-radius: 14px; font-size: 1rem; cursor: pointer; transition: all 0.25s ease; text-align: center; }
        .cloud-box.dark-mode .btn-option { background: rgba(255, 255, 255, 0.15); border-color: rgba(255, 255, 255, 0.25); color: #fff; }
        .btn-option:hover { background: rgba(0, 0, 0, 0.1); border-color: #333; transform: translateY(-2px); }
        .cloud-box.dark-mode .btn-option:hover { background: rgba(255, 255, 255, 0.3); border-color: #fff; }
    </style>
</head>
<body>

    <canvas id="webgl-canvas"></canvas>
    <div id="silver-mirror-overlay"></div>
    <div id="theater-mask"></div>

    <div id="ui-container">
        <div id="dialog-box" class="cloud-box">
            <h2 id="dialog-text">Hello there ...</h2>
            <div id="options-container" class="options-list" style="display: none;"></div>
        </div>
    </div>

    <script>
        const shaderUniformsHeader = `
            uniform vec2 iResolution; uniform float iTime;
            uniform float u_wave_a; uniform float u_wave_b; uniform vec3 u_palette_bias;
            vec3 palette( float t, vec3 bias ){ 
                vec3 a = vec3(0.5, 0.5, 0.5); vec3 b = vec3(0.5, 0.5, 0.5); vec3 c = vec3(1.0, 1.0, 1.0); vec3 d = u_palette_bias + bias; 
                return a + b * cos( 6.283185 * (c * t + d) );
            }
        `;

        const flowerShader = shaderUniformsHeader + `
            void main() {
                vec2 uv_center = (gl_FragCoord.xy * 2.0 - iResolution.xy) / iResolution.y; vec2 uv_bg = gl_FragCoord.xy / iResolution.xy;
                
                // 護眼校正：背景色只跟著時間緩慢前進 (0.05倍速)，絕對不加任何赫茲乘數
                float bg_t = uv_bg.x * 0.1 + uv_bg.y * 0.1 + iTime * 0.05; 
                vec3 backgroundColor = palette(bg_t, vec3(0.0));
                
                vec3 rippleLayerColorSum = vec3(0.0); float total_mix_weight = 0.0; float totalLoop = 50.0; 
                for(int i = 0; i < 4; i++) {
                    float timeInterval = 3.0; float timeOffset = float(i) * timeInterval + (float(i) * (float(i) - 1.0)) * 0.5;
                    float rippleTime = mod(iTime - timeOffset, totalLoop); if (rippleTime < 0.0) rippleTime += totalLoop;
                    vec2 startCorner; float stageTime; 
                    if (rippleTime < 25.0) { startCorner = vec2(1.5, 0.7); stageTime = rippleTime; } else { startCorner = vec2(-1.5, 0.7); stageTime = rippleTime - 25.0; }
                    
                    // 【雙頻率作用區】：僅影響波紋物理擴散進度與漫遊位置
                    float speedMultiplier = (0.005 + float(i) * 0.0005) * u_wave_b; float progress = stageTime * speedMultiplier; 
                    vec2 posOffset = vec2(float(i) * 0.03 * sign(startCorner.x), float(i) * 0.015); vec2 shiftedStart = startCorner + posOffset;
                    vec3 colorBias = vec3(float(i) * 0.15, float(i) * 0.08, float(i) * 0.05); vec2 targetCorner = -shiftedStart;
                    vec2 currentCenter = mix(shiftedStart, targetCorner, smoothstep(0.0, 12.0, stageTime * (u_wave_a * 0.005)));
                    
                    float centerDist = length(currentCenter); float instanceSize = 1.0 - float(i) * 0.2; 
                    float flowerScale = instanceSize * mix(1.0, 0.03, smoothstep(0.0, 1.5, centerDist));
                    vec2 toCorner = uv_center - currentCenter; float r = length(toCorner); float angle = atan(toCorner.y, toCorner.x); 
                    float theta5 = angle * 2.5; float flower_base = abs(sin(theta5)); float notch = 1.0 - abs(cos(theta5));
                    float sakuraShape = flower_base * 0.7 + notch * 0.25; float base_d = (r / flowerScale) / (0.3 + 0.5 * sakuraShape);
                    float theta = sin(base_d * 0.5 - progress * 1.5); float alpha = sin(base_d * 1.5 - progress * 3.5);
                    float theta_glow = 0.2 / (abs(theta) + 0.2); float alpha_glow = 0.06 / (abs(alpha) + 0.06); float layer_glow = theta_glow + alpha_glow;
                    float fadeIn = smoothstep(0.0, 1.5, stageTime * (u_wave_a * 0.005)); float fadeOut = 1.0 - smoothstep(12.0, 17.0, stageTime * (u_wave_a * 0.005));
                    layer_glow *= fadeIn * fadeOut * exp(-base_d * 0.2);
                    
                    // 護眼校正：線條顏色同樣只採平穩的時間遞進
                    vec3 thisCornerColor = palette(iTime * 0.05 + float(i) * 0.25, colorBias);
                    rippleLayerColorSum += thisCornerColor * layer_glow; total_mix_weight += layer_glow;
                }
                gl_FragColor = vec4(mix(backgroundColor, rippleLayerColorSum / (total_mix_weight + 0.001), 1.0 - exp(-total_mix_weight * 1.3)), 1.0);
            }
        `;

        const leafShader = shaderUniformsHeader + `
            void main() {
                float waveFreq = 1.2; float waveAmp = 0.12; float arcCurv = 0.65; float veinThick = 0.012;
                float ellipScale = 0.08; float ellipRatioX = 30.0; float ellipRatioY = 40.0; float ellipThick1 = 0.03; float ellipThick2 = 0.015; float sharpen = 3.5; float colorDelay = 0.5;   
                vec2 uv_center = (gl_FragCoord.xy * 2.0 - iResolution.xy) / iResolution.y; vec2 uv_bg = gl_FragCoord.xy / iResolution.xy;
                
                // 護眼校正：背景色極慢平穩前進
                vec3 backgroundColor = palette(uv_bg.x * 0.1 + uv_bg.y * 0.1 + iTime * 0.04, vec3(0.0));
                vec3 rippleLayerColorSum = vec3(0.0); float total_mix_weight = 0.0; float totalLoop = 50.0; 
                
                // 【雙頻率作用區】：控制內層幾何格柵時間軸
                float waveA_time = stageTime * u_wave_a * 0.005; float waveB_time = stageTime * u_wave_b * 0.005;
                float angle_radians = atan(5.0 / 9.0); float ext_cos = cos(angle_radians); float ext_sin = sin(angle_radians);
                for(int i = 0; i < 4; i++) {
                    float timeOffset = float(i) * 3.0 + (float(i) * (float(i) - 1.0)) * 0.5; float rippleTime = mod(iTime - timeOffset, totalLoop); if (rippleTime < 0.0) rippleTime += totalLoop;
                    vec2 startCorner, center1, center2; float stageTime; 
                    if (rippleTime < 25.0) { startCorner = vec2(1.5, 0.7); center1 = vec2(1.5, -1.3); center2 = vec2(-1.5, 1.3); stageTime = rippleTime; } 
                    else { startCorner = vec2(-1.5, 0.7); center1 = vec2(-1.5, -1.3); center2 = vec2(1.5, 1.3); stageTime = rippleTime - 25.0; }
                    vec2 targetCorner = -startCorner; vec2 currentCenter = mix(startCorner, targetCorner, smoothstep(0.0, 12.0, stageTime * (u_wave_a * 0.004)));
                    float leafScale = (1.0 - float(i) * 0.2) * sin(clamp((stageTime * (u_wave_b * 0.004)) / 14.0, 0.0, 1.0) * 3.14159);
                    vec2 toCorner = uv_center - currentCenter; float moveAngle = atan(targetCorner.y - startCorner.y, targetCorner.x - startCorner.x);
                    vec2 leaf_uv = vec2(toCorner.x * cos(moveAngle) + toCorner.y * sin(moveAngle), -toCorner.x * sin(moveAngle) + toCorner.y * cos(moveAngle));
                    leaf_uv.y += sin(leaf_uv.x * waveFreq) * waveAmp * leafScale; float v_arc = (leaf_uv.x - sqrt(abs(leaf_uv.y)) * arcCurv) / leafScale;
                    
                    float leaf_glow = (0.6 / (abs(sin(v_arc * 1.0 - waveA_time)) + 0.4) * 0.3 + 0.25 / (abs(sin(v_arc * 2.5 - waveB_time)) + 0.15) * 0.4);
                    leaf_glow += (veinThick / (abs(leaf_uv.y / leafScale) + veinThick)) * smoothstep(1.0, 0.0, leaf_uv.x / leafScale);
                    float current_sin = (rippleTime < 25.0) ? ext_sin : -ext_sin; float ellipse_glow = 0.0; vec2 centers[2]; centers[0] = center1; centers[1] = center2;
                    for(int j = 0; j < 2; j++) {
                        vec2 toC = uv_center - centers[j]; vec2 rot = vec2(toC.x * ext_cos + toC.y * current_sin, -toC.x * current_sin + toC.y * ext_cos);
                        float d = sqrt(rot.x * rot.x * ellipRatioX + rot.y * rot.y * ellipRatioY) * ellipScale;
                        float g1 = pow(ellipThick1 / (abs(sin(d * 0.8 - stageTime * (u_wave_a * 0.004))) + ellipThick1), 2.0);
                        float g2 = pow(ellipThick2 / (abs(sin(d * 2.5 - stageTime * (u_wave_b * 0.004))) + ellipThick2), 2.0);
                        ellipse_glow += (g1 + g2) * exp(-d * 0.5) * 0.35 * sharpen;
                    }
                    float global_env = smoothstep(1.8, 0.0, abs(uv_center.x * ext_sin - uv_center.y * ext_cos) * 0.4);
                    float time_env = smoothstep(0.0, 1.0, stageTime * (u_wave_a * 0.004)) * (1.0 - smoothstep(10.0, 14.0, stageTime * (u_wave_b * 0.004)));
                    
                    // 護眼校正：葉片與幾何光暈配色均速前進
                    vec3 bias = vec3(float(i)*0.05); vec3 leafColor = palette(iTime * 0.05 + float(i) * 0.25, bias); vec3 ellipColor = palette(iTime * 0.05 + float(i) * 0.25 + colorDelay, bias);
                    rippleLayerColorSum += (leafColor * leaf_glow + ellipColor * ellipse_glow) * time_env * global_env; total_mix_weight += (leaf_glow + ellipse_glow) * time_env * global_env;
                }
                gl_FragColor = vec4(mix(backgroundColor, rippleLayerColorSum / (total_mix_weight + 0.001), 1.0 - exp(-total_mix_weight * 1.2)), 1.0);
            }
        `;

        const waveShader = shaderUniformsHeader + `
            void main() {
                vec2 uv_center = (gl_FragCoord.xy * 2.0 - iResolution.xy) / iResolution.y; vec2 uv_bg = gl_FragCoord.xy / iResolution.xy;
                
                // 護眼校正：背景色慢速線性移動
                float bg_t = uv_bg.x * 0.1 + uv_bg.y * 0.1 + iTime * 0.03; vec3 backgroundColor = palette(bg_t, vec3(0.0));
                vec3 rippleLayerColorSum = vec3(0.0); float total_mix_weight = 0.0; float totalLoop = 50.0; 
                for(int i = 0; i < 2; i++) {
                    float timeInterval = 8.0; float timeOffset = float(i) * timeInterval + (float(i) * (float(i) - 1.0)) * 0.5;
                    float rippleTime = mod(iTime - timeOffset, totalLoop); if (rippleTime < 0.0) rippleTime += totalLoop;
                    vec2 startCorner; float stageTime; 
                    if (rippleTime < 25.0) { startCorner = vec2(-1.5, -0.7); stageTime = rippleTime; } else { startCorner = vec2(1.5, -0.7); stageTime = rippleTime - 25.0; }
                    
                    // 【雙頻率作用區】：控制扭曲幅度的動態前進
                    float speedMultiplier = (0.002 + float(i) * 0.0002) * u_wave_b; float progress = stageTime * speedMultiplier; 
                    vec2 posOffset = vec2(float(i) * 0.05 * sign(startCorner.x), -float(i) * 0.03); vec2 shiftedStart = startCorner + posOffset;
                    vec3 colorBias = vec3(float(i) * 0.12, float(i) * 0.06, float(i) * 0.15); vec2 targetCorner = -shiftedStart;
                    vec2 currentCenter = mix(shiftedStart, targetCorner, smoothstep(0.0, 12.0, stageTime * (u_wave_a * 0.003)));
                    
                    float centerDist = length(currentCenter); float instanceSize = 1.0 - float(i) * 0.15; float waveScale = instanceSize * mix(1.0, 0.1, smoothstep(0.0, 1.8, centerDist));
                    vec2 toCenter = uv_center - currentCenter; float waveDirection = -sign(startCorner.x); 
                    float r = length(toCenter); float angle = atan(toCenter.y, toCenter.x); float twist = 1.5 / (r + 0.1); float twistedAngle = angle + twist * waveDirection - progress * 0.5;
                    float waveShape = sin(twistedAngle * 3.0); waveShape = pow(abs(waveShape), 0.5) * sign(waveShape); float base_d = (r / waveScale) / (0.4 + 0.4 * waveShape);
                    float wave1 = sin(base_d * 1.0 - progress * 2.0); float wave2 = cos(base_d * 2.25 + twistedAngle * 2.0 - stageTime * (u_wave_a * 0.004));
                    float wave_line1 = 0.1 / (abs(wave1) + 0.1); float wave_line2 = 0.05 / (abs(wave2) + 0.05); float layer_glow = wave_line1 * 1.2 + wave_line2 * wave_line1 * 0.8;
                    float fadeIn = smoothstep(0.0, 1.5, stageTime * (u_wave_a * 0.003)); float fadeOut = 1.0 - smoothstep(12.0, 17.0, stageTime * (u_wave_a * 0.003));
                    layer_glow *= fadeIn * fadeOut * exp(-base_d * 0.15);
                    
                    // 護眼校正：海浪線條配色平穩
                    vec3 thisCornerColor = palette(iTime * 0.04 + float(i) * 0.3, colorBias); rippleLayerColorSum += thisCornerColor * layer_glow; total_mix_weight += layer_glow;
                }
                gl_FragColor = vec4(mix(backgroundColor, rippleLayerColorSum / (total_mix_weight + 0.001), 1.0 - exp(-total_mix_weight * 1.5)), 1.0);
            }
        `;
    </script>

    <script>
        // --- 1. Three.js 初始化 ---
        const canvas = document.getElementById('webgl-canvas');
        const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        const scene = new THREE.Scene();
        const camera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);

        const shaderUniforms = {
            iResolution: { value: new THREE.Vector2(window.innerWidth, window.innerHeight) },
            iTime: { value: 0 },
            u_wave_a: { value: 10.0 },
            u_wave_b: { value: 15.0 },
            u_palette_bias: { value: new THREE.Vector3(0.0, 0.1, 0.2) }
        };

        const geometry = new THREE.PlaneGeometry(2, 2);
        let shaderMaterial = new THREE.ShaderMaterial({
            fragmentShader: flowerShader,
            uniforms: shaderUniforms,
            depthWrite: false, depthTest: false
        });
        const mesh = new THREE.Mesh(geometry, shaderMaterial);
        scene.add(mesh);

        window.addEventListener('resize', () => {
            renderer.setSize(window.innerWidth, window.innerHeight);
            shaderUniforms.iResolution.value.set(window.innerWidth, window.innerHeight);
        });

        const clock = new THREE.Clock();
        function animate() {
            requestAnimationFrame(animate);
            shaderUniforms.iTime.value = clock.getElapsedTime();
            renderer.render(scene, camera);
        }
        animate();

        // --- 2. 劇本動態流程與選項控制 (完全遵循 Miro 規範) ---
        const dialogBox = document.getElementById('dialog-box');
        const dialogText = document.getElementById('dialog-text');
        const optionsContainer = document.getElementById('options-container');
        const silverOverlay = document.getElementById('silver-mirror-overlay');
        const theaterMask = document.getElementById('theater-mask');

        const delay = ms => new Promise(res => setTimeout(res, ms));

        async function updateDialogText(text) {
            dialogBox.classList.remove('show');
            await delay(1500);
            dialogText.innerText = text;
            dialogBox.classList.add('show');
        }

        async function startFlow() {
            await delay(500);
            dialogBox.classList.add('show');
            await delay(2000); // Output 1
            
            await updateDialogText("How's your day?");
            await delay(2000); // Output 2

            await updateDialogText("Just take a breathe, and tell us ...");
            await delay(2000); // Output 3

            showOption1();
        }

        // Option 1: 選擇腦波群組
        async function showOption1() {
            dialogBox.classList.remove('show');
            await delay(1500);
            dialogText.innerText = "How do you feel right now?";
            optionsContainer.innerHTML = `
                <div class="btn-option" onclick="handleSelectOption1(10.0, 15.0)">1. calm and relaxed (Alpha 10Hz + Beta 15Hz)</div>
                <div class="btn-option" onclick="handleSelectOption1(6.0, 10.0)">2. a bit tired or stressed (Theta 6Hz + Alpha 10Hz)</div>
                <div class="btn-option" onclick="handleSelectOption1(20.0, 40.0)">3. energized and motivated (Beta 20Hz + Gamma 40Hz)</div>
            `;
            optionsContainer.style.display = "flex";
            dialogBox.classList.add('show');
        }

        function handleSelectOption1(waveA, waveB) {
            dialogBox.classList.add('fade-fast');
            
            // 精準注入幾何變數，僅控制幾何形變
            shaderUniforms.u_wave_a.value = waveA;
            shaderUniforms.u_wave_b.value = waveB;

            setTimeout(async () => {
                optionsContainer.style.display = "none";
                dialogBox.classList.remove('fade-fast');
                
                dialogText.innerText = "What are you planning to do next ?";
                dialogBox.classList.add('show');
                await delay(2000); // Output 4
                
                showOption2();
            }, 300);
        }

        // Option 2: 選擇氛圍色盤
        async function showOption2() {
            dialogBox.classList.remove('show');
            await delay(1500);
            dialogText.innerText = "Choose a vibe for your next step:";
            optionsContainer.innerHTML = `
                <div class="btn-option" onclick="selectOption2(0.0, 0.1, 0.2)">1. Just unwind and chill</div>
                <div class="btn-option" onclick="selectOption2(0.3, 0.0, 0.4)">2. Do something fun</div>
                <div class="btn-option" onclick="selectOption2(0.5, 0.5, 0.0)">3. Stay active or go out</div>
            `;
            optionsContainer.style.display = "flex";
            dialogBox.classList.add('show');
        }

        function selectOption2(r_bias, g_bias, b_bias) {
            dialogBox.classList.add('fade-fast');
            shaderUniforms.u_palette_bias.value.set(r_bias, g_bias, b_bias);

            setTimeout(() => {
                optionsContainer.style.display = "none";
                dialogBox.classList.remove('fade-fast');
                showOption3();
            }, 300);
        }

        // Option 3: 選擇形狀
        async function showOption3() {
            dialogText.innerText = "Pick a symbol that guides you:";
            optionsContainer.innerHTML = `
                <div class="btn-option" onclick="selectOption3('flower')">🌸 Sakura Flower</div>
                <div class="btn-option" onclick="selectOption3('leaf')">🌿 Radiant Leaf</div>
                <div class="btn-option" onclick="selectOption3('wave')">🌊 Great Wave</div>
            `;
            optionsContainer.style.display = "flex";
            dialogBox.classList.add('show');
        }

        function selectOption3(type) {
            dialogBox.classList.add('fade-fast');
            if (type === 'flower') mesh.material.fragmentShader = flowerShader;
            else if (type === 'leaf') mesh.material.fragmentShader = leafShader;
            else if (type === 'wave') mesh.material.fragmentShader = waveShader;
            mesh.material.needsUpdate = true;

            setTimeout(async () => {
                optionsContainer.style.display = "none";
                dialogBox.classList.remove('fade-fast');
                
                // Output 5
                dialogText.innerText = "A moment before the gift ...";
                
                silverOverlay.style.opacity = '0';
                theaterMask.style.opacity = '1';
                dialogBox.classList.add('dark-mode');
                
                dialogBox.classList.add('show');
                await delay(3000); // 停 3 秒
                
                // Output 6
                await updateDialogText("And here you are !");
                await delay(2000); // 停 2 秒
                
                dialogBox.classList.remove('show');
                theaterMask.style.opacity = '0';
            }, 300);
        }

        startFlow();
    </script>
</body>
</html>
